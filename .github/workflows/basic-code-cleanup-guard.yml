name: Basic Code Cleanup Guard
run-name: "Basic cleanup guard (${{ inputs.cleanup_mode }})"

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Branch or ref to clean"
        required: true
        default: "main"
        type: string
      cleanup_mode:
        description: "Cleanup level: safe, format, or format_lintfix"
        required: true
        default: "format_lintfix"
        type: choice
        options:
          - safe
          - format
          - format_lintfix
      run_lwc_contract_validation:
        description: "Also compare LWC runtime contracts in the validation org"
        required: true
        default: false
        type: boolean

  workflow_call:
    inputs:
      source_dir:
        required: false
        default: "force-app"
        type: string
      target_ref:
        required: false
        default: "main"
        type: string
      cleanup_mode:
        required: false
        default: "safe"
        type: string
      create_fix_branch:
        required: false
        default: true
        type: boolean
      create_pull_request:
        required: false
        default: true
        type: boolean
      draft_pull_request:
        required: false
        default: true
        type: boolean
      fix_branch_prefix:
        required: false
        default: "auto/cleanup"
        type: string
      run_deploy_validate:
        required: false
        default: true
        type: boolean
      enforce_deploy_validation:
        required: false
        default: true
        type: boolean
      test_level:
        required: false
        default: "RunRelevantTests"
        type: string
      deploy_wait_minutes:
        required: false
        default: "30"
        type: string
      run_lwc_contract_validation:
        required: false
        default: false
        type: boolean
      enforce_lwc_contract_validation:
        required: false
        default: true
        type: boolean
      allow_primary_auth_for_lwc_contract:
        required: false
        default: false
        type: boolean
      lwc_contract_tolerance_px:
        required: false
        default: "1"
        type: string
      lwc_contract_wait_ms:
        required: false
        default: "8000"
        type: string
      tools_repository:
        required: false
        default: ""
        type: string
      tools_ref:
        required: false
        default: ""
        type: string
    secrets:
      SF_AUTH_URL:
        required: false
      SF_VISUAL_AUTH_URL:
        required: false
      TOOLS_REPOSITORY_TOKEN:
        required: false

permissions:
  contents: write
  pull-requests: write
  statuses: write

env:
  SF_CLI_VERSION: "2.133.4"
  SF_CODE_ANALYZER_VERSION: "5.13.0"
  SLDS_LINTER_VERSION: "1.2.1"
  PLAYWRIGHT_VERSION: "1.60.0"
  PRETTIER_VERSION: "3.5.3"
  PRETTIER_APEX_VERSION: "2.2.6"
  PRETTIER_XML_VERSION: "3.4.1"
  REPORT_DIR: "docs/basic-code-cleanup-guard"
  INPUT_SOURCE_DIR: ${{ inputs.source_dir || vars.SF_SOURCE_DIR || 'force-app' }}
  INPUT_TARGET_REF: ${{ inputs.target_ref }}
  INPUT_CLEANUP_MODE: ${{ inputs.cleanup_mode }}
  INPUT_FIX_BRANCH_PREFIX: ${{ inputs.fix_branch_prefix || 'auto/cleanup' }}
  INPUT_TEST_LEVEL: ${{ inputs.test_level || 'RunRelevantTests' }}
  INPUT_DEPLOY_WAIT_MINUTES: ${{ inputs.deploy_wait_minutes || '30' }}
  INPUT_LWC_CONTRACT_TOLERANCE_PX: ${{ inputs.lwc_contract_tolerance_px || '1' }}
  INPUT_LWC_CONTRACT_WAIT_MS: ${{ inputs.lwc_contract_wait_ms || '8000' }}
  INPUT_ALLOW_PRIMARY_AUTH_FOR_LWC_CONTRACT: ${{ github.event_name == 'workflow_dispatch' || inputs.allow_primary_auth_for_lwc_contract }}
  INPUT_RUN_DEPLOY_VALIDATE: ${{ github.event_name == 'workflow_dispatch' || inputs.run_deploy_validate }}
  INPUT_ENFORCE_DEPLOY_VALIDATION: ${{ github.event_name == 'workflow_dispatch' || inputs.enforce_deploy_validation }}
  INPUT_RUN_LWC_CONTRACT_VALIDATION: ${{ inputs.run_lwc_contract_validation }}
  INPUT_ENFORCE_LWC_CONTRACT_VALIDATION: ${{ github.event_name == 'workflow_dispatch' || inputs.enforce_lwc_contract_validation }}
  INPUT_CREATE_FIX_BRANCH: ${{ github.event_name == 'workflow_dispatch' || inputs.create_fix_branch }}
  INPUT_CREATE_PULL_REQUEST: ${{ github.event_name == 'workflow_dispatch' || inputs.create_pull_request }}
  INPUT_DRAFT_PULL_REQUEST: ${{ github.event_name == 'workflow_dispatch' || inputs.draft_pull_request }}

jobs:
  basic-code-cleanup-guard:
    name: Test basic code cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout workflow tools
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.tools_repository || job.workflow_repository }}
          ref: ${{ inputs.tools_ref || job.workflow_sha }}
          token: ${{ secrets.TOOLS_REPOSITORY_TOKEN || github.token }}
          fetch-depth: 0
          path: tools
          submodules: false
          persist-credentials: false

      - name: Checkout target project
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git clone \
            --no-recurse-submodules \
            --branch "$INPUT_TARGET_REF" \
            --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
            project

      - name: Validate workflow inputs
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$INPUT_SOURCE_DIR" =~ ^[A-Za-z0-9._/-]+$ ]] ||
             [[ "$INPUT_SOURCE_DIR" = /* ]] ||
             [[ "$INPUT_SOURCE_DIR" =~ (^|/)\.\.(/|$) ]]; then
            echo "Invalid source_dir: use a relative path inside the repository." >&2
            exit 1
          fi

          if ! git check-ref-format --branch "$INPUT_TARGET_REF" >/dev/null 2>&1; then
            echo "Invalid target_ref: expected a valid branch or tag name." >&2
            exit 1
          fi

          if ! [[ "$INPUT_DEPLOY_WAIT_MINUTES" =~ ^[0-9]+$ ]] ||
             (( INPUT_DEPLOY_WAIT_MINUTES < 1 || INPUT_DEPLOY_WAIT_MINUTES > 120 )); then
            echo "Invalid deploy_wait_minutes: expected an integer from 1 to 120." >&2
            exit 1
          fi

          if ! [[ "$INPUT_LWC_CONTRACT_WAIT_MS" =~ ^[0-9]+$ ]] ||
             (( INPUT_LWC_CONTRACT_WAIT_MS < 1000 || INPUT_LWC_CONTRACT_WAIT_MS > 60000 )); then
            echo "Invalid lwc_contract_wait_ms: expected an integer from 1000 to 60000." >&2
            exit 1
          fi

          if ! [[ "$INPUT_LWC_CONTRACT_TOLERANCE_PX" =~ ^[0-9]+$ ]] ||
             (( INPUT_LWC_CONTRACT_TOLERANCE_PX > 20 )); then
            echo "Invalid lwc_contract_tolerance_px: expected an integer from 0 to 20." >&2
            exit 1
          fi

          candidate_branch="$INPUT_FIX_BRANCH_PREFIX/$INPUT_CLEANUP_MODE/validation"
          if ! git check-ref-format --branch "$candidate_branch" >/dev/null 2>&1; then
            echo "Invalid fix_branch_prefix: it does not produce a valid Git branch." >&2
            exit 1
          fi

          git -C project remote set-url origin "https://github.com/${{ github.repository }}.git"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Test cleanup guard tools
        working-directory: tools
        run: npm test

      - name: Install Salesforce CLI
        shell: bash
        run: npm install --global @salesforce/cli@${SF_CLI_VERSION}

      - name: Install Salesforce Code Analyzer plugin
        shell: bash
        run: sf plugins install code-analyzer@${SF_CODE_ANALYZER_VERSION}

      - name: Prepare report directory
        shell: bash
        working-directory: project
        run: |
          mkdir -p "${REPORT_DIR}"
          rm -f "${REPORT_DIR}"/*
          cat > "${REPORT_DIR}/cleanup-prettier.config.mjs" <<'EOF'
          export default {
            plugins: ["prettier-plugin-apex", "@prettier/plugin-xml"],
            overrides: [
              { files: "**/lwc/**/*.html", options: { parser: "lwc" } },
              { files: "*.{cmp,page,component}", options: { parser: "html" } }
            ]
          };
          EOF

      - name: Install project style dependencies
        id: project-deps
        shell: bash
        working-directory: project
        run: |
          report_md="${REPORT_DIR}/style-dependencies-report.md"
          report_json="${REPORT_DIR}/style-dependencies-report.json"

          if [ ! -f package.json ]; then
            {
              echo "# Style Dependencies"
              echo
              echo "- Status: skipped"
              echo "- Reason: package.json was not found"
            } > "$report_md"
            echo '{"installed":false,"status":"skipped_no_package_json","exitCode":0}' > "$report_json"
            echo "installed=false" >> "$GITHUB_OUTPUT"
            echo "Style dependency install skipped. package.json was not found."
            exit 0
          fi

          set +e
          npm install --no-save --no-package-lock
          project_install_code=$?
          npm install --no-save --no-package-lock \
            "prettier@${PRETTIER_VERSION}" \
            "prettier-plugin-apex@${PRETTIER_APEX_VERSION}" \
            "@prettier/plugin-xml@${PRETTIER_XML_VERSION}"
          formatter_install_code=$?

          if [ "$project_install_code" -eq 0 ] && [ "$formatter_install_code" -eq 0 ]; then
            install_code=0
          else
            install_code=1
          fi

          if [ "$install_code" -eq 0 ]; then
            status="completed"
            installed="true"
          else
            status="npm_install_failed"
            installed="false"
          fi

          {
            echo "# Style Dependencies"
            echo
            echo "- Status: ${status}"
            echo "- Exit code: ${install_code}"
          } > "$report_md"

          echo "{\"installed\":${installed},\"status\":\"${status}\",\"exitCode\":${install_code}}" > "$report_json"
          echo "installed=${installed}" >> "$GITHUB_OUTPUT"
          echo "Style dependency install status: ${status}. Exit code: ${install_code}."
          exit 0

      - name: Run style checks before cleanup
        shell: bash
        working-directory: project
        run: |
          prettier_log="${REPORT_DIR}/prettier-before.txt"
          eslint_log="${REPORT_DIR}/eslint-before.txt"
          report_json="${REPORT_DIR}/style-checks-before.json"

          if [ "${{ steps.project-deps.outputs.installed }}" != "true" ]; then
            echo "Style checks before cleanup skipped because dependencies were not installed." > "$prettier_log"
            echo "Style checks before cleanup skipped because dependencies were not installed." > "$eslint_log"
            echo '{"prettierExitCode":0,"eslintExitCode":0,"status":"skipped_no_dependencies"}' > "$report_json"
            exit 0
          fi

          set +e
          npx prettier --config "${REPORT_DIR}/cleanup-prettier.config.mjs" --check --ignore-unknown "$INPUT_SOURCE_DIR/**/*.{cls,cmp,component,css,html,js,json,md,page,trigger,xml,yaml,yml}" > "$prettier_log" 2>&1
          prettier_code=$?
          prettier_warnings=$(sed -E 's/\x1B\[[0-9;]*[mK]//g' "$prettier_log" | grep -c '^\[warn\]' || true)

          npm run lint > "$eslint_log" 2>&1
          eslint_code=$?
          eslint_summary=$(grep -E '[0-9]+ problems? \(' "$eslint_log" | tail -1 || true)
          eslint_problems=$(echo "$eslint_summary" | grep -Eo '[0-9]+ problems?' | awk '{print $1}')
          eslint_errors=$(echo "$eslint_summary" | grep -Eo '[0-9]+ errors?' | awk '{print $1}')
          eslint_warnings=$(echo "$eslint_summary" | grep -Eo '[0-9]+ warnings?' | awk '{print $1}')
          eslint_problems=${eslint_problems:-0}
          eslint_errors=${eslint_errors:-0}
          eslint_warnings=${eslint_warnings:-0}

          echo "{\"prettierExitCode\":${prettier_code},\"prettierWarnings\":${prettier_warnings},\"eslintExitCode\":${eslint_code},\"eslintProblems\":${eslint_problems},\"eslintErrors\":${eslint_errors},\"eslintWarnings\":${eslint_warnings},\"status\":\"completed\"}" > "$report_json"
          echo "Style checks before cleanup completed. Prettier exit code: ${prettier_code}. Prettier warnings: ${prettier_warnings}. ESLint exit code: ${eslint_code}. ESLint problems: ${eslint_problems}."
          exit 0

      - name: Run analyzer before cleanup
        id: analyzer-before
        continue-on-error: true
        shell: bash
        working-directory: project
        run: |
          set +e
          sf code-analyzer run \
            --workspace . \
            --target "$INPUT_SOURCE_DIR" \
            --rule-selector Recommended \
            --output-file "${REPORT_DIR}/analyzer-before.csv" \
            --view table
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Apply analyzer-guided safe fixes
        shell: bash
        working-directory: project
        run: |
          node ../tools/scripts/nodejs/apply-analyzer-guided-fixes.mjs \
            --root . \
            --report "${REPORT_DIR}/analyzer-before.csv" \
            --json "${REPORT_DIR}/analyzer-guided-fixes.json" \
            --markdown "${REPORT_DIR}/analyzer-guided-fixes.md"

      - name: Apply basic cleanup in runner
        shell: bash
        working-directory: project
        run: |
          node ../tools/scripts/nodejs/basic-code-cleanup-guard.mjs \
            --source-dir "$INPUT_SOURCE_DIR" \
            --report "${REPORT_DIR}/basic-code-cleanup-report.md" \
            --json "${REPORT_DIR}/basic-code-cleanup-report.json"

      - name: Run optional SLDS auto-fix
        shell: bash
        working-directory: project
        run: |
          report_md="${REPORT_DIR}/slds-autofix-report.md"
          report_json="${REPORT_DIR}/slds-autofix-report.json"
          report_log="${REPORT_DIR}/slds-autofix.log"

          if [ "$INPUT_CLEANUP_MODE" != "format_lintfix" ]; then
            {
              echo "# SLDS Auto-fix"
              echo
              echo "- Status: skipped"
              echo "- Reason: cleanup_mode is not format_lintfix"
            } > "$report_md"
            echo '{"enabled":false,"status":"skipped","exitCode":0}' > "$report_json"
            exit 0
          fi

          set +e
          npx --yes "@salesforce-ux/slds-linter@${SLDS_LINTER_VERSION}" \
            lint "$INPUT_SOURCE_DIR" --fix > "$report_log" 2>&1
          slds_code=$?
          set -e

          if [ "$slds_code" -eq 0 ]; then
            status="completed"
          else
            status="completed_with_remaining_findings"
          fi

          {
            echo "# SLDS Auto-fix"
            echo
            echo "- Status: ${status}"
            echo "- Exit code: ${slds_code}"
            echo "- Source dir: $INPUT_SOURCE_DIR"
          } > "$report_md"

          echo "{\"enabled\":true,\"status\":\"${status}\",\"exitCode\":${slds_code}}" > "$report_json"
          echo "SLDS auto-fix status: ${status}. Exit code: ${slds_code}."

      - name: Run optional formatter cleanup
        shell: bash
        working-directory: project
        run: |
          report_md="${REPORT_DIR}/formatting-report.md"
          report_json="${REPORT_DIR}/formatting-report.json"

          if [ "$INPUT_CLEANUP_MODE" = "safe" ]; then
            {
              echo "# Formatting Cleanup"
              echo
              echo "- Mode: safe"
              echo "- Status: skipped"
              echo
              echo "Prettier formatting was not requested."
            } > "$report_md"
            echo '{"mode":"safe","enabled":false,"status":"skipped","exitCode":0}' > "$report_json"
            echo "Formatting cleanup skipped. cleanup_mode=safe."
            exit 0
          fi

          if [ ! -f package.json ]; then
            {
              echo "# Formatting Cleanup"
              echo
              echo "- Mode: $INPUT_CLEANUP_MODE"
              echo "- Status: skipped"
              echo
              echo "package.json was not found, so Prettier could not be installed."
            } > "$report_md"
            echo '{"mode":"format","enabled":true,"status":"skipped_no_package_json","exitCode":0}' > "$report_json"
            echo "Formatting cleanup skipped. package.json was not found."
            exit 0
          fi

          if [ "${{ steps.project-deps.outputs.installed }}" != "true" ]; then
            {
              echo "# Formatting Cleanup"
              echo
              echo "- Mode: $INPUT_CLEANUP_MODE"
              echo "- Status: skipped"
              echo
              echo "Project style dependencies were not installed."
            } > "$report_md"
            echo '{"mode":"format","enabled":true,"status":"skipped_no_dependencies","exitCode":0}' > "$report_json"
            echo "Formatting cleanup skipped. Project style dependencies were not installed."
            exit 0
          fi

          set +e
          npx prettier --config "${REPORT_DIR}/cleanup-prettier.config.mjs" --write --ignore-unknown "$INPUT_SOURCE_DIR/**/*.{cls,cmp,component,css,html,js,json,md,page,trigger,xml,yaml,yml}"
          prettier_code=$?

          if [ "$prettier_code" -eq 0 ]; then
            status="completed"
          else
            status="prettier_failed"
          fi

          {
            echo "# Formatting Cleanup"
            echo
            echo "- Mode: $INPUT_CLEANUP_MODE"
            echo "- Status: ${status}"
            echo "- Prettier exit code: ${prettier_code}"
            echo "- Scope: $INPUT_SOURCE_DIR"
          } > "$report_md"

          echo "{\"mode\":\"format\",\"enabled\":true,\"status\":\"${status}\",\"exitCode\":${prettier_code}}" > "$report_json"
          echo "Formatting cleanup status: ${status}. Prettier exit code: ${prettier_code}."
          exit 0

      - name: Run optional ESLint auto-fix
        shell: bash
        working-directory: project
        run: |
          report_md="${REPORT_DIR}/eslint-fix-report.md"
          report_json="${REPORT_DIR}/eslint-fix-report.json"
          eslint_fix_log="${REPORT_DIR}/eslint-fix.txt"

          if [ "$INPUT_CLEANUP_MODE" != "format_lintfix" ]; then
            {
              echo "# ESLint Auto-fix"
              echo
              echo "- Mode: $INPUT_CLEANUP_MODE"
              echo "- Status: skipped"
              echo
              echo "ESLint --fix was not requested."
            } > "$report_md"
            echo '{"enabled":false,"status":"skipped","eslintFixExitCode":0,"postFixPrettierExitCode":0}' > "$report_json"
            echo "ESLint auto-fix skipped. cleanup_mode=$INPUT_CLEANUP_MODE."
            exit 0
          fi

          if [ "${{ steps.project-deps.outputs.installed }}" != "true" ]; then
            {
              echo "# ESLint Auto-fix"
              echo
              echo "- Mode: format_lintfix"
              echo "- Status: skipped"
              echo
              echo "Project style dependencies were not installed."
            } > "$report_md"
            echo '{"enabled":true,"status":"skipped_no_dependencies","eslintFixExitCode":0,"postFixPrettierExitCode":0}' > "$report_json"
            echo "ESLint auto-fix skipped. Project style dependencies were not installed."
            exit 0
          fi

          set +e
          npx eslint **/{aura,lwc}/**/*.js --fix > "$eslint_fix_log" 2>&1
          eslint_fix_code=$?

          npx prettier --config "${REPORT_DIR}/cleanup-prettier.config.mjs" --write --ignore-unknown "$INPUT_SOURCE_DIR/**/*.{cls,cmp,component,css,html,js,json,md,page,trigger,xml,yaml,yml}" >> "$eslint_fix_log" 2>&1
          post_fix_prettier_code=$?

          if [ "$eslint_fix_code" -eq 0 ]; then
            status="completed"
          else
            status="completed_with_remaining_lint"
          fi

          {
            echo "# ESLint Auto-fix"
            echo
            echo "- Mode: format_lintfix"
            echo "- Status: ${status}"
            echo "- ESLint --fix exit code: ${eslint_fix_code}"
            echo "- Post-fix Prettier exit code: ${post_fix_prettier_code}"
            echo
            echo "ESLint --fix may still exit non-zero when non-fixable lint problems remain."
          } > "$report_md"

          echo "{\"enabled\":true,\"status\":\"${status}\",\"eslintFixExitCode\":${eslint_fix_code},\"postFixPrettierExitCode\":${post_fix_prettier_code}}" > "$report_json"
          echo "ESLint auto-fix status: ${status}. ESLint --fix exit code: ${eslint_fix_code}. Post-fix Prettier exit code: ${post_fix_prettier_code}."
          exit 0

      - name: Run style checks after cleanup
        shell: bash
        working-directory: project
        run: |
          prettier_log="${REPORT_DIR}/prettier-after.txt"
          eslint_log="${REPORT_DIR}/eslint-after.txt"
          report_json="${REPORT_DIR}/style-checks-after.json"

          if [ "${{ steps.project-deps.outputs.installed }}" != "true" ]; then
            echo "Style checks after cleanup skipped because dependencies were not installed." > "$prettier_log"
            echo "Style checks after cleanup skipped because dependencies were not installed." > "$eslint_log"
            echo '{"prettierExitCode":0,"eslintExitCode":0,"status":"skipped_no_dependencies"}' > "$report_json"
            exit 0
          fi

          set +e
          npx prettier --config "${REPORT_DIR}/cleanup-prettier.config.mjs" --check --ignore-unknown "$INPUT_SOURCE_DIR/**/*.{cls,cmp,component,css,html,js,json,md,page,trigger,xml,yaml,yml}" > "$prettier_log" 2>&1
          prettier_code=$?
          prettier_warnings=$(sed -E 's/\x1B\[[0-9;]*[mK]//g' "$prettier_log" | grep -c '^\[warn\]' || true)

          npm run lint > "$eslint_log" 2>&1
          eslint_code=$?
          eslint_summary=$(grep -E '[0-9]+ problems? \(' "$eslint_log" | tail -1 || true)
          eslint_problems=$(echo "$eslint_summary" | grep -Eo '[0-9]+ problems?' | awk '{print $1}')
          eslint_errors=$(echo "$eslint_summary" | grep -Eo '[0-9]+ errors?' | awk '{print $1}')
          eslint_warnings=$(echo "$eslint_summary" | grep -Eo '[0-9]+ warnings?' | awk '{print $1}')
          eslint_problems=${eslint_problems:-0}
          eslint_errors=${eslint_errors:-0}
          eslint_warnings=${eslint_warnings:-0}

          echo "{\"prettierExitCode\":${prettier_code},\"prettierWarnings\":${prettier_warnings},\"eslintExitCode\":${eslint_code},\"eslintProblems\":${eslint_problems},\"eslintErrors\":${eslint_errors},\"eslintWarnings\":${eslint_warnings},\"status\":\"completed\"}" > "$report_json"
          echo "Style checks after cleanup completed. Prettier exit code: ${prettier_code}. Prettier warnings: ${prettier_warnings}. ESLint exit code: ${eslint_code}. ESLint problems: ${eslint_problems}."
          exit 0

      - name: Save cleanup patch
        shell: bash
        working-directory: project
        run: |
          git diff --name-only > "${REPORT_DIR}/changed-files.txt"
          git diff > "${REPORT_DIR}/basic-code-cleanup.patch"
          git diff --stat > "${REPORT_DIR}/basic-code-cleanup.diffstat"
          git diff --numstat > "${REPORT_DIR}/basic-code-cleanup.numstat"
          awk '
            BEGIN { files=0; insertions=0; deletions=0 }
            {
              files += 1
              if ($1 ~ /^[0-9]+$/) insertions += $1
              if ($2 ~ /^[0-9]+$/) deletions += $2
            }
            END {
              print "diff_files=" files
              print "diff_insertions=" insertions
              print "diff_deletions=" deletions
            }
          ' "${REPORT_DIR}/basic-code-cleanup.numstat" > "${REPORT_DIR}/diff-summary.env"

      - name: Run analyzer after cleanup
        id: analyzer-after
        continue-on-error: true
        shell: bash
        working-directory: project
        run: |
          set +e
          sf code-analyzer run \
            --workspace . \
            --target "$INPUT_SOURCE_DIR" \
            --rule-selector Recommended \
            --output-file "${REPORT_DIR}/analyzer-after.csv" \
            --view table
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Compare analyzer results
        shell: bash
        working-directory: project
        run: |
          node ../tools/scripts/nodejs/compare-basic-cleanup-analyzer-results.mjs \
            --before "${REPORT_DIR}/analyzer-before.csv" \
            --after "${REPORT_DIR}/analyzer-after.csv" \
            --out-dir "${REPORT_DIR}" \
            --target-ref "$INPUT_TARGET_REF" \
            --source-dir "$INPUT_SOURCE_DIR" \
            --before-exit-code "${{ steps.analyzer-before.outputs.exit_code }}" \
            --after-exit-code "${{ steps.analyzer-after.outputs.exit_code }}"

          cat "${REPORT_DIR}/analyzer-comparison.md"

      - name: Validate deployment in Salesforce
        id: deploy-validation
        if: ${{ env.INPUT_RUN_DEPLOY_VALIDATE == 'true' }}
        shell: bash
        working-directory: project
        env:
          SF_AUTH_URL: ${{ secrets.SF_AUTH_URL }}
        run: |
          set -euo pipefail

          report_md="${REPORT_DIR}/deploy-validation-report.md"
          report_log="${REPORT_DIR}/deploy-validation.log"

          if [ -z "${SF_AUTH_URL:-}" ]; then
            status="failed"
            validate_code=1
            {
              echo "# Deploy validation"
              echo
              echo "- Status: ${status}"
              echo "- Reason: SF_AUTH_URL secret is not configured."
            } > "$report_md"
            echo "SF_AUTH_URL secret is not configured." > "$report_log"
            echo "deploy_validation_status=${status}" >> "$GITHUB_OUTPUT"
            echo "deploy_validation_exit_code=${validate_code}" >> "$GITHUB_OUTPUT"
            cat "$report_log"
            exit 0
          fi

          auth_file="$(mktemp)"
          trap 'rm -f "$auth_file"' EXIT
          printf '%s' "$SF_AUTH_URL" > "$auth_file"

          set +e
          sf org login sfdx-url --sfdx-url-file "$auth_file" --alias validation-org > "$report_log" 2>&1
          login_code=$?

          if [ "$login_code" -ne 0 ]; then
            validate_code="$login_code"
          else
            if [ ! -f sfdx-project.json ]; then
              sf api request rest "/services/data/" \
                --target-org validation-org \
                > "${REPORT_DIR}/salesforce-supported-api-versions.json"

              node ../tools/scripts/nodejs/resolve-salesforce-api-version.mjs \
                --requested auto \
                --project "sfdx-project.json" \
                --versions-json "${REPORT_DIR}/salesforce-supported-api-versions.json" \
                --json "${REPORT_DIR}/temporary-project-api-version.json" \
                --markdown "${REPORT_DIR}/temporary-project-api-version.md"

              target_api_version="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.resolved)" "${REPORT_DIR}/temporary-project-api-version.json")"
              node ../tools/scripts/nodejs/ensure-salesforce-project.mjs \
                --project "sfdx-project.json" \
                --source-dir "$INPUT_SOURCE_DIR" \
                --target-api "$target_api_version" \
                --json "${REPORT_DIR}/temporary-project.json"
            fi

            {
              echo
              echo "Running deploy validation..."
            } >> "$report_log"

            sf project deploy validate \
              --source-dir "$INPUT_SOURCE_DIR" \
              --target-org validation-org \
              --test-level "$INPUT_TEST_LEVEL" \
              --wait "$INPUT_DEPLOY_WAIT_MINUTES" >> "$report_log" 2>&1
            validate_code=$?
          fi
          set -e

          if [ "$validate_code" -eq 0 ]; then
            status="passed"
          else
            status="failed"
          fi

          {
            echo "# Deploy validation"
            echo
            echo "- Status: ${status}"
            echo "- Test level: $INPUT_TEST_LEVEL"
            echo "- Source dir: $INPUT_SOURCE_DIR"
            echo "- Exit code: ${validate_code}"
          } > "$report_md"

          echo "deploy_validation_status=${status}" >> "$GITHUB_OUTPUT"
          echo "deploy_validation_exit_code=${validate_code}" >> "$GITHUB_OUTPUT"

          cat "$report_log"
          exit 0

      - name: Validate LWC runtime contracts
        id: lwc-contract
        if: ${{ env.INPUT_RUN_LWC_CONTRACT_VALIDATION == 'true' }}
        shell: bash
        env:
          SF_VISUAL_AUTH_URL: ${{ secrets.SF_VISUAL_AUTH_URL }}
          SF_PRIMARY_AUTH_URL: ${{ secrets.SF_AUTH_URL }}
        run: |
          set -uo pipefail

          report_dir="project/${REPORT_DIR}"
          report_md="${report_dir}/lwc-contract-validation.md"
          report_json="${report_dir}/lwc-contract-validation.json"
          changed_files="${report_dir}/changed-files.txt"
          baseline_dir="${GITHUB_WORKSPACE}/lwc-contract-baseline"
          auth_file="$(mktemp)"
          baseline_ready=false
          visual_org_ready=false

          finish() {
            set +e
            if [ "$baseline_ready" = "true" ] && [ "$visual_org_ready" = "true" ]; then
              (
                cd "$baseline_dir"
                sf project deploy start \
                  --source-dir "$INPUT_SOURCE_DIR" \
                  --target-org visual-validation-org \
                  --test-level NoTestRun \
                  --wait "$INPUT_DEPLOY_WAIT_MINUTES"
              ) > "${report_dir}/lwc-contract-restore.log" 2>&1
              (
                cd "$baseline_dir"
                sf project delete source \
                  --metadata "LightningComponentBundle:autofixValidationHarness" \
                  --metadata "AuraDefinitionBundle:autofixValidationHarnessHost" \
                  --target-org visual-validation-org \
                  --test-level NoTestRun \
                  --wait "$INPUT_DEPLOY_WAIT_MINUTES" \
                  --no-prompt
              ) > "${report_dir}/lwc-contract-harness-cleanup.log" 2>&1 || true
            fi
            rm -f "$auth_file" "${report_dir}/lwc-contract-url.json"
            rm -rf \
              "project/$INPUT_SOURCE_DIR/main/default/lwc/autofixValidationHarness" \
              "project/$INPUT_SOURCE_DIR/main/default/aura/autofixValidationHarnessHost" \
              "$baseline_dir"
          }
          trap finish EXIT

          write_failure() {
            local reason="$1"
            printf '{"status":"failed","reason":"%s"}\n' "$reason" > "$report_json"
            {
              echo "# LWC contract validation"
              echo
              echo "- Status: **failed**"
              echo "- Reason: ${reason}"
            } > "$report_md"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "reason=${reason}" >> "$GITHUB_OUTPUT"
          }

          selected_auth_url="${SF_VISUAL_AUTH_URL:-}"
          if [ -z "$selected_auth_url" ] && [ "$INPUT_ALLOW_PRIMARY_AUTH_FOR_LWC_CONTRACT" = "true" ]; then
            selected_auth_url="${SF_PRIMARY_AUTH_URL:-}"
          fi
          if [ -z "$selected_auth_url" ]; then
            write_failure "SF_VISUAL_AUTH_URL is not configured and the primary auth fallback is disabled"
            exit 0
          fi

          lwc_prefix="$INPUT_SOURCE_DIR/main/default/lwc/"
          if ! awk -v prefix="$lwc_prefix" 'index($0, prefix) == 1 { found=1; exit } END { exit !found }' "$changed_files"; then
            echo '{"status":"skipped_no_lwc","componentsChecked":0}' > "$report_json"
            {
              echo "# LWC contract validation"
              echo
              echo "- Status: **skipped_no_lwc**"
              echo "- Components checked: **0**"
            } > "$report_md"
            echo "status=skipped_no_lwc" >> "$GITHUB_OUTPUT"
            echo "reason=no changed LWC bundles" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git clone --quiet --no-hardlinks --no-recurse-submodules project "$baseline_dir"; then
            write_failure "Baseline checkout failed"
            exit 0
          fi

          if ! node tools/scripts/nodejs/generate-lwc-contract-harness.mjs \
            --project-root "$baseline_dir" \
            --source-dir "$INPUT_SOURCE_DIR" \
            --changed-files "$changed_files" \
            --manifest "${report_dir}/lwc-contract-manifest.json"; then
            write_failure "Baseline LWC harness generation failed"
            exit 0
          fi
          if ! node tools/scripts/nodejs/generate-lwc-contract-harness.mjs \
            --project-root project \
            --source-dir "$INPUT_SOURCE_DIR" \
            --changed-files "$changed_files" \
            --manifest "${report_dir}/lwc-contract-manifest.json"; then
            write_failure "Candidate LWC harness generation failed"
            exit 0
          fi

          component_count="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.components.length)" "${report_dir}/lwc-contract-manifest.json")"
          if [ "$component_count" -eq 0 ]; then
            echo '{"status":"skipped_no_lwc","componentsChecked":0}' > "$report_json"
            echo "# LWC contract validation" > "$report_md"
            echo "status=skipped_no_lwc" >> "$GITHUB_OUTPUT"
            echo "reason=no deployable changed LWC bundles" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! npm install --prefix tools --no-save --no-package-lock "playwright@${PLAYWRIGHT_VERSION}" \
            > "${report_dir}/lwc-contract-playwright-install.log" 2>&1; then
            write_failure "Playwright installation failed"
            exit 0
          fi
          if ! (cd tools && npx playwright install --with-deps chromium) \
            >> "${report_dir}/lwc-contract-playwright-install.log" 2>&1; then
            write_failure "Chromium installation failed"
            exit 0
          fi

          printf '%s' "$selected_auth_url" > "$auth_file"
          if ! sf org login sfdx-url --sfdx-url-file "$auth_file" --alias visual-validation-org \
            > "${report_dir}/lwc-contract-auth.log" 2>&1; then
            write_failure "Salesforce visual validation org authentication failed"
            exit 0
          fi
          visual_org_ready=true

          if [ ! -f project/sfdx-project.json ]; then
            if ! sf api request rest "/services/data/" \
              --target-org visual-validation-org \
              > "${report_dir}/lwc-supported-api-versions.json"; then
              write_failure "Salesforce API version discovery failed"
              exit 0
            fi
            if ! node tools/scripts/nodejs/resolve-salesforce-api-version.mjs \
              --requested auto \
              --project "project/sfdx-project.json" \
              --versions-json "${report_dir}/lwc-supported-api-versions.json" \
              --json "${report_dir}/lwc-temporary-project-api-version.json" \
              --markdown "${report_dir}/lwc-temporary-project-api-version.md"; then
              write_failure "Salesforce API version resolution failed"
              exit 0
            fi
            target_api_version="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.resolved)" "${report_dir}/lwc-temporary-project-api-version.json")"
            if ! node tools/scripts/nodejs/ensure-salesforce-project.mjs \
              --project "project/sfdx-project.json" \
              --source-dir "$INPUT_SOURCE_DIR" \
              --target-api "$target_api_version" \
              --json "${report_dir}/lwc-temporary-project.json"; then
              write_failure "Temporary Salesforce project creation failed"
              exit 0
            fi
          fi

          if [ ! -f "$baseline_dir/sfdx-project.json" ]; then
            cp project/sfdx-project.json "$baseline_dir/sfdx-project.json"
          fi

          if ! (
            cd "$baseline_dir"
            sf project deploy start \
              --source-dir "$INPUT_SOURCE_DIR" \
              --target-org visual-validation-org \
              --test-level NoTestRun \
              --wait "$INPUT_DEPLOY_WAIT_MINUTES"
          ) > "${report_dir}/lwc-contract-baseline-deploy.log" 2>&1; then
            write_failure "Baseline deployment failed"
            exit 0
          fi
          baseline_ready=true

          route="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.route)" "${report_dir}/lwc-contract-manifest.json")"
          if ! sf org open --target-org visual-validation-org --path "$route" --url-only --json \
            > "${report_dir}/lwc-contract-url.json" 2> "${report_dir}/lwc-contract-browser.log"; then
            write_failure "Baseline harness URL generation failed"
            exit 0
          fi
          if ! node tools/scripts/nodejs/capture-lwc-contract.mjs \
            --url-json "${report_dir}/lwc-contract-url.json" \
            --manifest "${report_dir}/lwc-contract-manifest.json" \
            --output "${report_dir}/lwc-contract-baseline.json" \
            --wait-ms "$INPUT_LWC_CONTRACT_WAIT_MS" \
            >> "${report_dir}/lwc-contract-browser.log" 2>&1; then
            write_failure "Baseline LWC contract capture failed"
            exit 0
          fi

          if ! (
            cd project
            sf project deploy start \
              --source-dir "$INPUT_SOURCE_DIR" \
              --target-org visual-validation-org \
              --test-level NoTestRun \
              --wait "$INPUT_DEPLOY_WAIT_MINUTES"
          ) > "${report_dir}/lwc-contract-candidate-deploy.log" 2>&1; then
            write_failure "Candidate deployment failed"
            exit 0
          fi

          if ! sf org open --target-org visual-validation-org --path "$route" --url-only --json \
            > "${report_dir}/lwc-contract-url.json" 2>> "${report_dir}/lwc-contract-browser.log"; then
            write_failure "Candidate harness URL generation failed"
            exit 0
          fi
          if ! node tools/scripts/nodejs/capture-lwc-contract.mjs \
            --url-json "${report_dir}/lwc-contract-url.json" \
            --manifest "${report_dir}/lwc-contract-manifest.json" \
            --output "${report_dir}/lwc-contract-candidate.json" \
            --wait-ms "$INPUT_LWC_CONTRACT_WAIT_MS" \
            >> "${report_dir}/lwc-contract-browser.log" 2>&1; then
            write_failure "Candidate LWC contract capture failed"
            exit 0
          fi

          set +e
          node tools/scripts/nodejs/compare-lwc-contracts.mjs \
            --baseline "${report_dir}/lwc-contract-baseline.json" \
            --candidate "${report_dir}/lwc-contract-candidate.json" \
            --json "$report_json" \
            --markdown "$report_md" \
            --tolerance-px "$INPUT_LWC_CONTRACT_TOLERANCE_PX"
          compare_code=$?
          set -e

          if [ "$compare_code" -eq 0 ]; then
            status="passed"
            reason="runtime contracts match"
          else
            status="failed"
            reason="runtime contract differences detected"
          fi
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Evaluate automated trust gate
        id: trust-gate
        shell: bash
        env:
          ANALYZER_AFTER_EXIT_CODE: ${{ steps.analyzer-after.outputs.exit_code }}
          DEPLOY_VALIDATION_STATUS: ${{ steps.deploy-validation.outputs.deploy_validation_status }}
          LWC_CONTRACT_STATUS: ${{ steps.lwc-contract.outputs.status }}
          INPUT_ENFORCE_LWC_CONTRACT_VALIDATION: ${{ env.INPUT_ENFORCE_LWC_CONTRACT_VALIDATION }}
        run: |
          node tools/scripts/nodejs/evaluate-cleanup-trust-gate.mjs \
            --report-dir "project/$REPORT_DIR" \
            --source-dir "$INPUT_SOURCE_DIR" \
            --analyzer-after-exit-code "$ANALYZER_AFTER_EXIT_CODE" \
            --deploy-requested "$INPUT_RUN_DEPLOY_VALIDATE" \
            --deploy-enforced "$INPUT_ENFORCE_DEPLOY_VALIDATION" \
            --deploy-status "${DEPLOY_VALIDATION_STATUS:-not_executed}" \
            --lwc-requested "$INPUT_RUN_LWC_CONTRACT_VALIDATION" \
            --lwc-enforced "$INPUT_ENFORCE_LWC_CONTRACT_VALIDATION" \
            --lwc-status "${LWC_CONTRACT_STATUS:-not_executed}" \
            --json "project/$REPORT_DIR/trust-gate.json" \
            --markdown "project/$REPORT_DIR/trust-gate.md"

      - name: Push cleanup fix branch
        id: push-fix
        if: ${{ env.INPUT_CREATE_FIX_BRANCH == 'true' && steps.trust-gate.outputs.allow_fix_branch == 'true' }}
        shell: bash
        working-directory: project
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          summary_file="${REPORT_DIR}/comparison-summary.env"
          diff_summary_file="${REPORT_DIR}/diff-summary.env"
          changed_file="${REPORT_DIR}/changed-files.txt"
          formatting_json="${REPORT_DIR}/formatting-report.json"
          eslint_fix_json="${REPORT_DIR}/eslint-fix-report.json"

          if [ ! -f "$summary_file" ] || [ ! -f "$diff_summary_file" ] || [ ! -f "$changed_file" ]; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "branch=" >> "$GITHUB_OUTPUT"
            echo "reason=missing comparison, diff, or changed-files report" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          set -a
          . "$summary_file"
          . "$diff_summary_file"
          set +a

          changed_count="$(grep -cve '^[[:space:]]*$' "$changed_file" || true)"
          formatter_status="unknown"
          post_fix_prettier_code=0

          if [ -f "$formatting_json" ]; then
            formatter_status="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.status || 'unknown')" "$formatting_json")"
          fi

          if [ -f "$eslint_fix_json" ]; then
            post_fix_prettier_code="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.postFixPrettierExitCode ?? 0)" "$eslint_fix_json")"
          fi

          if [ "$changed_count" -eq 0 ] || [ "${diff_files:-0}" -eq 0 ]; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "branch=" >> "$GITHUB_OUTPUT"
            echo "reason=no files changed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${new_high_or_critical:-0}" -gt 0 ]; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "branch=" >> "$GITHUB_OUTPUT"
            echo "reason=new High/Critical findings detected" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${new_findings:-0}" -gt 0 ]; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "branch=" >> "$GITHUB_OUTPUT"
            echo "reason=new analyzer findings detected" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ steps.analyzer-after.outputs.exit_code }}" != "0" ]; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "branch=" >> "$GITHUB_OUTPUT"
            echo "reason=analyzer after cleanup did not complete successfully" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$formatter_status" = "prettier_failed" ] || [ "$post_fix_prettier_code" -ne 0 ]; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "branch=" >> "$GITHUB_OUTPUT"
            echo "reason=formatter failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          safe_mode="$(printf '%s' "$INPUT_CLEANUP_MODE" | tr '/:@ ' '----' | tr -cd 'A-Za-z0-9._-')"
          fix_branch="$INPUT_FIX_BRANCH_PREFIX/${safe_mode}/run-${{ github.run_id }}-${{ github.run_attempt }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$fix_branch"
          git add --pathspec-from-file="$changed_file"
          git commit --no-verify -m "Apply basic code cleanup"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push --set-upstream origin "$fix_branch"

          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$fix_branch" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "reason=fix branch pushed" >> "$GITHUB_OUTPUT"

      - name: Publish automated trust status
        if: ${{ steps.push-fix.outputs.sha != '' }}
        uses: actions/github-script@v8
        env:
          FIX_COMMIT_SHA: ${{ steps.push-fix.outputs.sha }}
          TRUST_GATE_DECISION: ${{ steps.trust-gate.outputs.decision }}
        with:
          script: |
            const decision = process.env.TRUST_GATE_DECISION;
            const state = decision === 'SAFE_TO_REVIEW' ? 'success' : 'failure';
            const description = decision === 'SAFE_TO_REVIEW'
              ? 'Automated cleanup validations passed'
              : `Cleanup requires review: ${decision}`;
            const targetUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            for (const statusContext of [
              'Cleanup Guard / Automated Trust Gate',
              'Verify maintenance trust'
            ]) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: process.env.FIX_COMMIT_SHA,
                state,
                context: statusContext,
                description,
                target_url: targetUrl
              });
            }

      - name: Open cleanup fix pull request
        id: fix-pr
        if: ${{ env.INPUT_CREATE_PULL_REQUEST == 'true' && steps.push-fix.outputs.branch != '' }}
        uses: actions/github-script@v8
        env:
          FIX_BRANCH_NAME: ${{ steps.push-fix.outputs.branch }}
          TARGET_REF: ${{ inputs.target_ref }}
          CLEANUP_MODE: ${{ inputs.cleanup_mode }}
          SOURCE_DIR: ${{ env.INPUT_SOURCE_DIR }}
          DRAFT_PULL_REQUEST: ${{ env.INPUT_DRAFT_PULL_REQUEST }}
          DEPLOY_VALIDATION_STATUS: ${{ steps.deploy-validation.outputs.deploy_validation_status }}
          DEPLOY_VALIDATION_EXIT_CODE: ${{ steps.deploy-validation.outputs.deploy_validation_exit_code }}
          LWC_CONTRACT_STATUS: ${{ steps.lwc-contract.outputs.status }}
          LWC_CONTRACT_REASON: ${{ steps.lwc-contract.outputs.reason }}
          TRUST_GATE_DECISION: ${{ steps.trust-gate.outputs.decision }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = process.env.FIX_BRANCH_NAME;
            const base = process.env.TARGET_REF;
            const summaryPath = 'project/docs/basic-code-cleanup-guard/comparison-summary.env';
            const diffSummaryPath = 'project/docs/basic-code-cleanup-guard/diff-summary.env';
            const styleBeforePath = 'project/docs/basic-code-cleanup-guard/style-checks-before.json';
            const styleAfterPath = 'project/docs/basic-code-cleanup-guard/style-checks-after.json';
            const cleanupReportPath = 'project/docs/basic-code-cleanup-guard/basic-code-cleanup-report.json';
            const sldsReportPath = 'project/docs/basic-code-cleanup-guard/slds-autofix-report.json';
            const guidedFixesPath = 'project/docs/basic-code-cleanup-guard/analyzer-guided-fixes.json';

            function readEnvFile(filePath) {
              if (!fs.existsSync(filePath)) return {};
              return Object.fromEntries(
                fs.readFileSync(filePath, 'utf8')
                  .split(/\r?\n/)
                  .filter(Boolean)
                  .map((line) => {
                    const index = line.indexOf('=');
                    return index === -1 ? [line, ''] : [line.slice(0, index), line.slice(index + 1)];
                  })
              );
            }

            function readJsonFile(filePath) {
              if (!fs.existsSync(filePath)) return {};
              return JSON.parse(fs.readFileSync(filePath, 'utf8'));
            }

            const summary = readEnvFile(summaryPath);
            const diffSummary = readEnvFile(diffSummaryPath);
            const styleBefore = readJsonFile(styleBeforePath);
            const styleAfter = readJsonFile(styleAfterPath);
            const cleanupReport = readJsonFile(cleanupReportPath);
            const sldsReport = readJsonFile(sldsReportPath);
            const guidedFixes = readJsonFile(guidedFixesPath);

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${head}`,
              base
            });

            if (existing.data.length) {
              core.setOutput('url', existing.data[0].html_url);
              core.info(`Existing PR found: ${existing.data[0].html_url}`);
              return;
            }

            const body = [
              'Automated cleanup generated by the Basic Code Cleanup Guard.',
              '',
              `- Cleanup mode: ${process.env.CLEANUP_MODE}`,
              `- Source directory: ${process.env.SOURCE_DIR}`,
              `- Workflow run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              '',
              '## Trust Ruleset',
              '',
              '| Rule | Status |',
              '| --- | --- |',
              `| Automated trust gate | ${process.env.TRUST_GATE_DECISION || 'REVIEW'} |`,
              `| Fix branch created | PASS |`,
              `| Analyzer new High/Critical findings | ${summary.new_high_or_critical || '0'} |`,
              `| Analyzer total findings | ${summary.total_before || '0'} -> ${summary.total_after || '0'} |`,
              `| SLDS hardcoded-value findings fixed | ${summary.slds_fixed_findings || '0'} |`,
              `| SLDS auto-fix | ${sldsReport.status || 'not executed'} |`,
              `| Analyzer-guided safe fixes | ${guidedFixes.totalFixes || '0'} |`,
              `| Prettier warnings | ${styleBefore.prettierWarnings ?? 0} -> ${styleAfter.prettierWarnings ?? 0} |`,
              `| ESLint problems | ${styleBefore.eslintProblems ?? 0} -> ${styleAfter.eslintProblems ?? 0} |`,
              `| JavaScript cleanup | var->let ${cleanupReport.varToLetFixed ?? 0}, unused event params ${cleanupReport.unusedEventParamsRemoved ?? 0}, let->const ${cleanupReport.letToConstFixed ?? 0}, http->https ${cleanupReport.insecureHttpFixed ?? 0}, structuredClone ${cleanupReport.jsonCloneFixed ?? 0}, crypto random ${cleanupReport.mathRandomFixed ?? 0} |`,
              `| Patch size | ${diffSummary.diff_files || '0'} files, ${diffSummary.diff_insertions || '0'} insertions, ${diffSummary.diff_deletions || '0'} deletions |`,
              `| Salesforce deploy validation | ${process.env.DEPLOY_VALIDATION_STATUS || 'not executed'} (${process.env.DEPLOY_VALIDATION_EXIT_CODE || 'unknown'}) |`,
              `| LWC runtime contract | ${process.env.LWC_CONTRACT_STATUS || 'not executed'} |`,
              `| External PR checks | PENDING |`,
              '',
              'Rules: keep this PR as draft until external checks pass and the generated patch has been reviewed.',
              '',
              'Review the patch and workflow artifacts before merging.'
            ].join('\n');

            const pull = await github.rest.pulls.create({
              owner,
              repo,
              title: `Apply basic code cleanup (${process.env.CLEANUP_MODE})`,
              head,
              base,
              body,
              draft: process.env.DRAFT_PULL_REQUEST === 'true'
            });

            core.setOutput('url', pull.data.html_url);
            core.info(`Created PR: ${pull.data.html_url}`);

      - name: Publish cleanup run result
        if: ${{ always() }}
        shell: bash
        working-directory: project
        env:
          FIX_BRANCH_PUSHED: ${{ steps.push-fix.outputs.pushed }}
          FIX_BRANCH_NAME: ${{ steps.push-fix.outputs.branch }}
          FIX_BRANCH_REASON: ${{ steps.push-fix.outputs.reason }}
          FIX_PR_URL: ${{ steps.fix-pr.outputs.url }}
          DEPLOY_VALIDATION_STATUS: ${{ steps.deploy-validation.outputs.deploy_validation_status }}
          DEPLOY_VALIDATION_EXIT_CODE: ${{ steps.deploy-validation.outputs.deploy_validation_exit_code }}
          LWC_CONTRACT_STATUS: ${{ steps.lwc-contract.outputs.status }}
          LWC_CONTRACT_REASON: ${{ steps.lwc-contract.outputs.reason }}
        run: |
          cleanup_json="${REPORT_DIR}/basic-code-cleanup-report.json"
          guided_json="${REPORT_DIR}/analyzer-guided-fixes.json"
          slds_json="${REPORT_DIR}/slds-autofix-report.json"
          formatting_json="${REPORT_DIR}/formatting-report.json"
          eslint_fix_json="${REPORT_DIR}/eslint-fix-report.json"
          style_before_json="${REPORT_DIR}/style-checks-before.json"
          style_after_json="${REPORT_DIR}/style-checks-after.json"
          summary_file="${REPORT_DIR}/comparison-summary.env"
          diff_summary_file="${REPORT_DIR}/diff-summary.env"
          deploy_log="${REPORT_DIR}/deploy-validation.log"
          lwc_contract_json="${REPORT_DIR}/lwc-contract-validation.json"

          append_deploy_validation_summary() {
            echo "### Salesforce Deployment Validation"
            echo
            if [ "$INPUT_RUN_DEPLOY_VALIDATE" != "true" ]; then
              echo "- Status: not executed."
              return
            fi

            echo "- Status: **${DEPLOY_VALIDATION_STATUS:-failed}**"
            echo "- Exit code: **${DEPLOY_VALIDATION_EXIT_CODE:-unknown}**"
            if [ "${DEPLOY_VALIDATION_STATUS:-failed}" = "passed" ]; then
              echo "- Merge recommendation: **SAFE TO REVIEW**"
            else
              echo "- Merge recommendation: **NOT SAFE**"
            fi
            if [ "$INPUT_ENFORCE_DEPLOY_VALIDATION" = "true" ]; then
              echo "- Enforcement: blocking"
            else
              echo "- Enforcement: advisory"
            fi

            if [ -f "$deploy_log" ]; then
              echo
              echo "<details>"
              echo "<summary>Main validation output</summary>"
              echo
              echo '```text'
              perl -pe 's/\e\[[0-9;?]*[A-Za-z]//g' "$deploy_log" \
                | grep -E '^(Status:|Deploy ID:|Test Failures|Passing:|Failing:|Total:|Error \(|.*Average test coverage.*|.*at least [0-9]+%.*|.*FIELD_CUSTOM_VALIDATION_EXCEPTION.*|.*CANNOT_EXECUTE_FLOW_TRIGGER.*|.*System\.AssertException.*|.*Class\..*: line .*)' \
                | head -n 80 || true
              echo '```'
              echo
              echo "</details>"
            else
              echo "- Output: validation log not found."
            fi
          }

          if [ -f "$cleanup_json" ]; then
            changed_files="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.changedFiles || 0)" "$cleanup_json")"
            trailing_fixed="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.trailingWhitespaceLinesFixed || 0)" "$cleanup_json")"
            final_newlines="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.finalNewlinesAdded || 0)" "$cleanup_json")"
            var_to_let_fixed="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.varToLetFixed || 0)" "$cleanup_json")"
            unused_event_params_removed="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.unusedEventParamsRemoved || 0)" "$cleanup_json")"
            let_to_const_fixed="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.letToConstFixed || 0)" "$cleanup_json")"
            insecure_http_fixed="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.insecureHttpFixed || 0)" "$cleanup_json")"
            json_clone_fixed="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.jsonCloneFixed || 0)" "$cleanup_json")"
            math_random_fixed="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.mathRandomFixed || 0)" "$cleanup_json")"
          else
            changed_files=0
            trailing_fixed=0
            final_newlines=0
            var_to_let_fixed=0
            unused_event_params_removed=0
            let_to_const_fixed=0
            insecure_http_fixed=0
            json_clone_fixed=0
            math_random_fixed=0
          fi

          if [ -f "$guided_json" ]; then
            guided_total="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.totalFixes || 0)" "$guided_json")"
            guided_slds="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.sldsHooks || 0)" "$guided_json")"
            guided_annotations="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.apexAnnotations || 0)" "$guided_json")"
            guided_braces="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.apexBraces || 0)" "$guided_json")"
          else
            guided_total=0
            guided_slds=0
            guided_annotations=0
            guided_braces=0
          fi

          if [ -f "$slds_json" ]; then
            slds_status="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.status || 'unknown')" "$slds_json")"
            slds_exit_code="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.exitCode ?? 0)" "$slds_json")"
          else
            slds_status="missing_report"
            slds_exit_code=0
          fi

          if [ -f "$formatting_json" ]; then
            formatter_status="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.status || 'unknown')" "$formatting_json")"
            formatter_exit_code="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.exitCode ?? 0)" "$formatting_json")"
          else
            formatter_status="missing_report"
            formatter_exit_code=0
          fi

          if [ -f "$eslint_fix_json" ]; then
            eslint_fix_status="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.status || 'unknown')" "$eslint_fix_json")"
            eslint_fix_exit_code="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.eslintFixExitCode ?? 0)" "$eslint_fix_json")"
          else
            eslint_fix_status="missing_report"
            eslint_fix_exit_code=0
          fi

          if [ -f "$style_before_json" ]; then
            prettier_before="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.prettierExitCode ?? 0)" "$style_before_json")"
            prettier_warnings_before="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.prettierWarnings ?? 0)" "$style_before_json")"
            eslint_before="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.eslintExitCode ?? 0)" "$style_before_json")"
            eslint_problems_before="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.eslintProblems ?? 0)" "$style_before_json")"
            eslint_errors_before="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.eslintErrors ?? 0)" "$style_before_json")"
            eslint_warnings_before="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.eslintWarnings ?? 0)" "$style_before_json")"
          else
            prettier_before=0
            prettier_warnings_before=0
            eslint_before=0
            eslint_problems_before=0
            eslint_errors_before=0
            eslint_warnings_before=0
          fi

          if [ -f "$style_after_json" ]; then
            prettier_after="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.prettierExitCode ?? 0)" "$style_after_json")"
            prettier_warnings_after="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.prettierWarnings ?? 0)" "$style_after_json")"
            eslint_after="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.eslintExitCode ?? 0)" "$style_after_json")"
            eslint_problems_after="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.eslintProblems ?? 0)" "$style_after_json")"
            eslint_errors_after="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.eslintErrors ?? 0)" "$style_after_json")"
            eslint_warnings_after="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.eslintWarnings ?? 0)" "$style_after_json")"
          else
            prettier_after=0
            prettier_warnings_after=0
            eslint_after=0
            eslint_problems_after=0
            eslint_errors_after=0
            eslint_warnings_after=0
          fi

          if [ -f "$summary_file" ]; then
            set -a
            . "$summary_file"
            set +a
          fi

          if [ -f "$diff_summary_file" ]; then
            set -a
            . "$diff_summary_file"
            set +a
          else
            diff_files=0
            diff_insertions=0
            diff_deletions=0
          fi

          prettier_fixed=$((prettier_warnings_before - prettier_warnings_after))
          eslint_fixed=$((eslint_problems_before - eslint_problems_after))
          classification_md="${REPORT_DIR}/cleanup-classification.md"
          classification_json="${REPORT_DIR}/cleanup-classification.json"

          if [ "${new_high_or_critical:-0}" -gt 0 ]; then
            operator_decision="NOT SAFE"
            operator_reason="New High/Critical findings appeared after cleanup."
          elif [ "${new_findings:-0}" -gt 0 ]; then
            operator_decision="NOT SAFE"
            operator_reason="New analyzer findings appeared after cleanup."
          elif [ "${prettier_warnings_after}" -gt "${prettier_warnings_before}" ] || [ "${eslint_problems_after}" -gt "${eslint_problems_before}" ]; then
            operator_decision="NOT SAFE"
            operator_reason="A style or lint quality signal regressed after cleanup."
          elif [ "$INPUT_RUN_DEPLOY_VALIDATE" != "true" ]; then
            operator_decision="REVIEW REQUIRED"
            operator_reason="Salesforce deployment validation was not executed."
          elif [ "${DEPLOY_VALIDATION_STATUS:-failed}" != "passed" ]; then
            operator_decision="NOT SAFE"
            operator_reason="Salesforce deployment validation failed."
          elif [ "$INPUT_RUN_LWC_CONTRACT_VALIDATION" = "true" ] && [ "${LWC_CONTRACT_STATUS:-failed}" != "passed" ] && [ "${LWC_CONTRACT_STATUS:-failed}" != "skipped_no_lwc" ]; then
            operator_decision="NOT SAFE"
            operator_reason="LWC runtime contract validation failed."
          elif [ "${diff_files}" -gt 0 ]; then
            operator_decision="SAFE TO REVIEW"
            operator_reason="Static checks improved and Salesforce deployment validation passed."
          else
            operator_decision="NO CHANGE"
            operator_reason="No cleanup patch was generated."
          fi

          {
            echo "# Cleanup Classification"
            echo
            echo "- Decision: **${operator_decision}**"
            echo "- Prettier warnings: **${prettier_warnings_before} -> ${prettier_warnings_after}**"
            echo "- ESLint problems: **${eslint_problems_before} -> ${eslint_problems_after}**"
            echo "- Analyzer findings: **${total_before:-0} -> ${total_after:-0}**"
            echo "- SLDS hardcoded-value findings fixed: **${slds_fixed_findings:-0}**"
            echo "- SLDS auto-fix: **${slds_status}** (exit ${slds_exit_code})"
            echo "- Analyzer-guided safe fixes: **${guided_total}**"
            echo "- LWC runtime contract: **${LWC_CONTRACT_STATUS:-not executed}**"
            echo "- JavaScript cleanup: **var->let ${var_to_let_fixed}**, **unused event params ${unused_event_params_removed}**, **let->const ${let_to_const_fixed}**, **http->https ${insecure_http_fixed}**, **structuredClone ${json_clone_fixed}**, **crypto random ${math_random_fixed}**"
            echo "- New High/Critical: **${new_high_or_critical:-0}**"
            echo "- Patch size: **${diff_files} files**, **${diff_insertions} insertions**, **${diff_deletions} deletions**"
          } > "$classification_md"

          node -e "
            const fs = require('fs');
            const data = {
              decision: process.argv[1],
              reason: process.argv[2],
              metrics: {
                prettierWarningsBefore: Number(process.argv[3]),
                prettierWarningsAfter: Number(process.argv[4]),
                prettierWarningsFixed: Number(process.argv[5]),
                eslintProblemsBefore: Number(process.argv[6]),
                eslintProblemsAfter: Number(process.argv[7]),
                eslintProblemsFixed: Number(process.argv[8]),
                analyzerFindingsBefore: Number(process.argv[9]),
                analyzerFindingsAfter: Number(process.argv[10]),
                analyzerFindingsFixed: Number(process.argv[11] || 0),
                newHighOrCriticalFindings: Number(process.argv[12] || 0),
                patchFilesChanged: Number(process.argv[13]),
                patchInsertions: Number(process.argv[14]),
                patchDeletions: Number(process.argv[15]),
                trailingWhitespaceLinesFixed: Number(process.argv[16]),
                finalNewlinesAdded: Number(process.argv[17]),
                varToLetFixed: Number(process.argv[18]),
                unusedEventParamsRemoved: Number(process.argv[19]),
                letToConstFixed: Number(process.argv[20]),
                insecureHttpFixed: Number(process.argv[21]),
                jsonCloneFixed: Number(process.argv[22]),
                mathRandomFixed: Number(process.argv[23]),
                sldsHardcodedValueFindingsFixed: Number(process.argv[24] || 0),
                analyzerGuidedFixes: Number(process.argv[25] || 0)
              }
            };
            fs.writeFileSync(process.argv[26], JSON.stringify(data, null, 2) + '\n');
          " \
            "${operator_decision}" \
            "${operator_reason}" \
            "${prettier_warnings_before}" \
            "${prettier_warnings_after}" \
            "${prettier_fixed}" \
            "${eslint_problems_before}" \
            "${eslint_problems_after}" \
            "${eslint_fixed}" \
            "${total_before:-0}" \
            "${total_after:-0}" \
            "${fixed_findings:-0}" \
            "${new_high_or_critical:-0}" \
            "${diff_files}" \
            "${diff_insertions}" \
            "${diff_deletions}" \
            "${trailing_fixed}" \
            "${final_newlines}" \
            "${var_to_let_fixed}" \
            "${unused_event_params_removed}" \
            "${let_to_const_fixed}" \
            "${insecure_http_fixed}" \
            "${json_clone_fixed}" \
            "${math_random_fixed}" \
            "${slds_fixed_findings:-0}" \
            "${guided_total}" \
            "$classification_json"

          echo "Cleanup result"
          echo "Decision: ${operator_decision}"
          echo "Reason: ${operator_reason}"
          echo "Prettier warnings: ${prettier_warnings_before} -> ${prettier_warnings_after}"
          echo "ESLint problems: ${eslint_problems_before} -> ${eslint_problems_after}"
          echo "Analyzer findings: ${total_before:-0} -> ${total_after:-0}"
          echo "SLDS hardcoded-value findings fixed: ${slds_fixed_findings:-0}"
          echo "Analyzer-guided safe fixes: ${guided_total}"
          echo "JavaScript cleanup: var->let ${var_to_let_fixed}, unused event params ${unused_event_params_removed}, let->const ${let_to_const_fixed}, http->https ${insecure_http_fixed}, structuredClone ${json_clone_fixed}, crypto random ${math_random_fixed}"
          echo "New High/Critical: ${new_high_or_critical:-0}"
          echo "::notice title=Cleanup result::${operator_decision}. ${operator_reason} Patch: ${diff_files} files. JS: var->let ${var_to_let_fixed}, unused event ${unused_event_params_removed}, let->const ${let_to_const_fixed}, http->https ${insecure_http_fixed}, structuredClone ${json_clone_fixed}, crypto random ${math_random_fixed}. Prettier: ${prettier_warnings_before}->${prettier_warnings_after}. ESLint: ${eslint_problems_before}->${eslint_problems_after}. Analyzer: ${total_before:-0}->${total_after:-0}. New High/Critical: ${new_high_or_critical:-0}."

          {
            echo "## Basic Code Cleanup Result"
            echo
            echo "### Decision"
            echo
            echo "**${operator_decision}**"
            echo
            echo "${operator_reason}"
            echo
            echo "| Metric | Before | After |"
            echo "| --- | ---: | ---: |"
            echo "| Prettier warnings | ${prettier_warnings_before} | ${prettier_warnings_after} |"
            echo "| ESLint problems | ${eslint_problems_before} | ${eslint_problems_after} |"
            echo "| Analyzer findings | ${total_before:-0} | ${total_after:-0} |"
            echo "| New High/Critical | 0 | ${new_high_or_critical:-0} |"
            echo
            echo "### Patch"
            echo
            echo "- Files changed: **${diff_files}**"
            echo "- Trailing whitespace lines fixed: **${trailing_fixed}**"
            echo "- Final newlines added: **${final_newlines}**"
            echo "- JavaScript var to let fixes: **${var_to_let_fixed}**"
            echo "- Unused event parameters removed: **${unused_event_params_removed}**"
            echo "- JavaScript let to const fixes: **${let_to_const_fixed}**"
            echo "- JavaScript http to https fixes: **${insecure_http_fixed}**"
            echo "- JavaScript structuredClone fixes: **${json_clone_fixed}**"
            echo "- JavaScript crypto random fixes: **${math_random_fixed}**"
            echo "- SLDS hardcoded-value findings fixed: **${slds_fixed_findings:-0}**"
            echo "- Analyzer-guided safe fixes: **${guided_total}** (SLDS ${guided_slds}, Apex annotations ${guided_annotations}, Apex braces ${guided_braces})"
            if [ "${FIX_BRANCH_PUSHED}" = "true" ]; then
              echo "- Fix branch: \`${FIX_BRANCH_NAME}\`"
              if [ -n "${FIX_PR_URL:-}" ]; then
                echo "- Pull request: ${FIX_PR_URL}"
              fi
            elif [ "$INPUT_ENFORCE_DEPLOY_VALIDATION" = "true" ] && [ "$INPUT_RUN_DEPLOY_VALIDATE" = "true" ] && [ "${DEPLOY_VALIDATION_STATUS:-failed}" != "passed" ]; then
              echo "- Fix branch: not created."
              echo "- Reason: deploy validation failed and enforcement is blocking."
            else
              echo "- Fix branch: not created."
              echo "- Reason: ${FIX_BRANCH_REASON:-not applicable}."
            fi
            if [ "$INPUT_RUN_DEPLOY_VALIDATE" = "true" ]; then
              echo "- Deploy validation: ${DEPLOY_VALIDATION_STATUS:-failed}."
            else
              echo "- Deploy validation: not executed."
            fi
            if [ "$INPUT_RUN_LWC_CONTRACT_VALIDATION" = "true" ]; then
              echo "- LWC runtime contract: ${LWC_CONTRACT_STATUS:-failed}."
            else
              echo "- LWC runtime contract: not executed."
            fi
            echo
            append_deploy_validation_summary
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
      - name: List generated reports
        if: ${{ always() }}
        shell: bash
        working-directory: project
        run: |
          find docs/basic-code-cleanup-guard -maxdepth 1 -type f -print | sort || true

      - name: Sanitize report paths
        if: ${{ always() }}
        shell: bash
        working-directory: project
        run: |
          export PROJECT_ROOT="$(pwd)"
          export WORKSPACE_ROOT="${GITHUB_WORKSPACE}"

          find "${REPORT_DIR}" -type f \( \
            -name "*.csv" -o \
            -name "*.json" -o \
            -name "*.md" -o \
            -name "*.txt" \
          \) -print0 | while IFS= read -r -d '' file; do
            perl -0pi -e 's#\Q$ENV{PROJECT_ROOT}\E/?##g; s#\Q$ENV{WORKSPACE_ROOT}\E/?##g' "$file"
          done

      - name: Upload basic cleanup artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: basic-code-cleanup-guard-${{ github.run_number }}
          path: |
            project/docs/basic-code-cleanup-guard/basic-code-cleanup-report.md
            project/docs/basic-code-cleanup-guard/basic-code-cleanup-report.json
            project/docs/basic-code-cleanup-guard/analyzer-guided-fixes.md
            project/docs/basic-code-cleanup-guard/analyzer-guided-fixes.json
            project/docs/basic-code-cleanup-guard/slds-autofix-report.md
            project/docs/basic-code-cleanup-guard/slds-autofix-report.json
            project/docs/basic-code-cleanup-guard/slds-autofix.log
            project/docs/basic-code-cleanup-guard/style-dependencies-report.md
            project/docs/basic-code-cleanup-guard/style-dependencies-report.json
            project/docs/basic-code-cleanup-guard/formatting-report.md
            project/docs/basic-code-cleanup-guard/formatting-report.json
            project/docs/basic-code-cleanup-guard/eslint-fix-report.md
            project/docs/basic-code-cleanup-guard/eslint-fix-report.json
            project/docs/basic-code-cleanup-guard/eslint-fix.txt
            project/docs/basic-code-cleanup-guard/prettier-before.txt
            project/docs/basic-code-cleanup-guard/prettier-after.txt
            project/docs/basic-code-cleanup-guard/eslint-before.txt
            project/docs/basic-code-cleanup-guard/eslint-after.txt
            project/docs/basic-code-cleanup-guard/style-checks-before.json
            project/docs/basic-code-cleanup-guard/style-checks-after.json
            project/docs/basic-code-cleanup-guard/cleanup-classification.md
            project/docs/basic-code-cleanup-guard/cleanup-classification.json
            project/docs/basic-code-cleanup-guard/basic-code-cleanup.patch
            project/docs/basic-code-cleanup-guard/basic-code-cleanup.diffstat
            project/docs/basic-code-cleanup-guard/basic-code-cleanup.numstat
            project/docs/basic-code-cleanup-guard/diff-summary.env
            project/docs/basic-code-cleanup-guard/changed-files.txt
            project/docs/basic-code-cleanup-guard/analyzer-before.csv
            project/docs/basic-code-cleanup-guard/analyzer-after.csv
            project/docs/basic-code-cleanup-guard/analyzer-comparison.md
            project/docs/basic-code-cleanup-guard/analyzer-comparison.json
            project/docs/basic-code-cleanup-guard/comparison-summary.env
            project/docs/basic-code-cleanup-guard/deploy-validation-report.md
            project/docs/basic-code-cleanup-guard/deploy-validation.log
            project/docs/basic-code-cleanup-guard/lwc-contract-*
            project/docs/basic-code-cleanup-guard/trust-gate.json
            project/docs/basic-code-cleanup-guard/trust-gate.md
          if-no-files-found: warn

      - name: Enforce automated trust gate
        if: ${{ always() && steps.trust-gate.outputs.decision == 'BLOCK' }}
        shell: bash
        run: |
          echo "The automated trust gate blocked this cleanup. Check trust-gate.md in the uploaded artifact."
          exit 1
