name: Basic Code Cleanup Guard
run-name: "Basic cleanup guard (${{ inputs.cleanup_mode }})"

on:
  workflow_dispatch:
    inputs:
      source_dir:
        description: "Salesforce source directory"
        required: true
        default: "force-app"
        type: string
      target_ref:
        description: "Branch or ref containing the Salesforce project to test"
        required: true
        default: "main"
        type: string
      cleanup_mode:
        description: "safe = whitespace/newline; format = safe plus Prettier; format_lintfix = format plus ESLint --fix"
        required: true
        default: "safe"
        type: choice
        options:
          - safe
          - format
          - format_lintfix
      create_fix_branch:
        description: "Create and push a branch with safe automated fixes"
        required: true
        default: true
        type: boolean
      fix_branch_prefix:
        description: "Prefix for the generated fix branch"
        required: true
        default: "auto/basic-code-cleanup"
        type: string
      run_deploy_validate:
        description: "Validate deployment in Salesforce before pushing the fix branch"
        required: true
        default: true
        type: boolean
      test_level:
        description: "Salesforce deploy validation test level"
        required: true
        default: "RunLocalTests"
        type: choice
        options:
          - NoTestRun
          - RunLocalTests
          - RunAllTestsInOrg
      deploy_wait_minutes:
        description: "Minutes to wait for Salesforce deploy validation"
        required: true
        default: "30"
        type: string

permissions:
  contents: write

env:
  SF_CLI_VERSION: "2.133.4"
  SF_CODE_ANALYZER_VERSION: "5.13.0"
  REPORT_DIR: "docs/basic-code-cleanup-guard"

jobs:
  basic-code-cleanup-guard:
    name: Test basic code cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout workflow tools
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: tools
          submodules: false
          persist-credentials: false

      - name: Checkout target project
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git clone \
            --no-recurse-submodules \
            --branch "${{ inputs.target_ref }}" \
            --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
            project

          git -C project remote set-url origin "https://github.com/${{ github.repository }}.git"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Salesforce CLI
        shell: bash
        run: npm install --global @salesforce/cli@${SF_CLI_VERSION}

      - name: Install Salesforce Code Analyzer plugin
        shell: bash
        run: sf plugins install code-analyzer@${SF_CODE_ANALYZER_VERSION}

      - name: Prepare report directory
        shell: bash
        working-directory: project
        run: |
          mkdir -p "${REPORT_DIR}"
          rm -f "${REPORT_DIR}"/*

      - name: Install project style dependencies
        id: project-deps
        shell: bash
        working-directory: project
        run: |
          report_md="${REPORT_DIR}/style-dependencies-report.md"
          report_json="${REPORT_DIR}/style-dependencies-report.json"

          if [ ! -f package.json ]; then
            {
              echo "# Style Dependencies"
              echo
              echo "- Status: skipped"
              echo "- Reason: package.json was not found"
            } > "$report_md"
            echo '{"installed":false,"status":"skipped_no_package_json","exitCode":0}' > "$report_json"
            echo "installed=false" >> "$GITHUB_OUTPUT"
            echo "Style dependency install skipped. package.json was not found."
            exit 0
          fi

          set +e
          npm install --no-save --no-package-lock
          install_code=$?

          if [ "$install_code" -eq 0 ]; then
            status="completed"
            installed="true"
          else
            status="npm_install_failed"
            installed="false"
          fi

          {
            echo "# Style Dependencies"
            echo
            echo "- Status: ${status}"
            echo "- Exit code: ${install_code}"
          } > "$report_md"

          echo "{\"installed\":${installed},\"status\":\"${status}\",\"exitCode\":${install_code}}" > "$report_json"
          echo "installed=${installed}" >> "$GITHUB_OUTPUT"
          echo "Style dependency install status: ${status}. Exit code: ${install_code}."
          exit 0

      - name: Run style checks before cleanup
        shell: bash
        working-directory: project
        run: |
          prettier_log="${REPORT_DIR}/prettier-before.txt"
          eslint_log="${REPORT_DIR}/eslint-before.txt"
          report_json="${REPORT_DIR}/style-checks-before.json"

          if [ "${{ steps.project-deps.outputs.installed }}" != "true" ]; then
            echo "Style checks before cleanup skipped because dependencies were not installed." > "$prettier_log"
            echo "Style checks before cleanup skipped because dependencies were not installed." > "$eslint_log"
            echo '{"prettierExitCode":0,"eslintExitCode":0,"status":"skipped_no_dependencies"}' > "$report_json"
            exit 0
          fi

          set +e
          npx prettier --check "${{ inputs.source_dir }}/**/*.{cls,cmp,component,css,html,js,json,md,page,trigger,xml,yaml,yml}" > "$prettier_log" 2>&1
          prettier_code=$?
          prettier_warnings=$(sed -E 's/\x1B\[[0-9;]*[mK]//g' "$prettier_log" | grep -c '^\[warn\]' || true)

          npm run lint > "$eslint_log" 2>&1
          eslint_code=$?
          eslint_summary=$(grep -E '[0-9]+ problems? \(' "$eslint_log" | tail -1 || true)
          eslint_problems=$(echo "$eslint_summary" | grep -Eo '[0-9]+ problems?' | awk '{print $1}')
          eslint_errors=$(echo "$eslint_summary" | grep -Eo '[0-9]+ errors?' | awk '{print $1}')
          eslint_warnings=$(echo "$eslint_summary" | grep -Eo '[0-9]+ warnings?' | awk '{print $1}')
          eslint_problems=${eslint_problems:-0}
          eslint_errors=${eslint_errors:-0}
          eslint_warnings=${eslint_warnings:-0}

          echo "{\"prettierExitCode\":${prettier_code},\"prettierWarnings\":${prettier_warnings},\"eslintExitCode\":${eslint_code},\"eslintProblems\":${eslint_problems},\"eslintErrors\":${eslint_errors},\"eslintWarnings\":${eslint_warnings},\"status\":\"completed\"}" > "$report_json"
          echo "Style checks before cleanup completed. Prettier exit code: ${prettier_code}. Prettier warnings: ${prettier_warnings}. ESLint exit code: ${eslint_code}. ESLint problems: ${eslint_problems}."
          exit 0

      - name: Run analyzer before cleanup
        id: analyzer-before
        continue-on-error: true
        shell: bash
        working-directory: project
        run: |
          set +e
          sf code-analyzer run \
            --workspace . \
            --target "${{ inputs.source_dir }}" \
            --rule-selector Recommended \
            --output-file "${REPORT_DIR}/analyzer-before.csv" \
            --view table
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Apply basic cleanup in runner
        shell: bash
        working-directory: project
        run: |
          node ../tools/scripts/nodejs/basic-code-cleanup-guard.mjs \
            --source-dir "${{ inputs.source_dir }}" \
            --report "${REPORT_DIR}/basic-code-cleanup-report.md" \
            --json "${REPORT_DIR}/basic-code-cleanup-report.json"

      - name: Run optional formatter cleanup
        shell: bash
        working-directory: project
        run: |
          report_md="${REPORT_DIR}/formatting-report.md"
          report_json="${REPORT_DIR}/formatting-report.json"

          if [ "${{ inputs.cleanup_mode }}" = "safe" ]; then
            {
              echo "# Formatting Cleanup"
              echo
              echo "- Mode: safe"
              echo "- Status: skipped"
              echo
              echo "Prettier formatting was not requested."
            } > "$report_md"
            echo '{"mode":"safe","enabled":false,"status":"skipped","exitCode":0}' > "$report_json"
            echo "Formatting cleanup skipped. cleanup_mode=safe."
            exit 0
          fi

          if [ ! -f package.json ]; then
            {
              echo "# Formatting Cleanup"
              echo
              echo "- Mode: ${{ inputs.cleanup_mode }}"
              echo "- Status: skipped"
              echo
              echo "package.json was not found, so Prettier could not be installed."
            } > "$report_md"
            echo '{"mode":"format","enabled":true,"status":"skipped_no_package_json","exitCode":0}' > "$report_json"
            echo "Formatting cleanup skipped. package.json was not found."
            exit 0
          fi

          if [ "${{ steps.project-deps.outputs.installed }}" != "true" ]; then
            {
              echo "# Formatting Cleanup"
              echo
              echo "- Mode: ${{ inputs.cleanup_mode }}"
              echo "- Status: skipped"
              echo
              echo "Project style dependencies were not installed."
            } > "$report_md"
            echo '{"mode":"format","enabled":true,"status":"skipped_no_dependencies","exitCode":0}' > "$report_json"
            echo "Formatting cleanup skipped. Project style dependencies were not installed."
            exit 0
          fi

          set +e
          npx prettier --write "${{ inputs.source_dir }}/**/*.{cls,cmp,component,css,html,js,json,md,page,trigger,xml,yaml,yml}"
          prettier_code=$?

          if [ "$prettier_code" -eq 0 ]; then
            status="completed"
          else
            status="prettier_failed"
          fi

          {
            echo "# Formatting Cleanup"
            echo
            echo "- Mode: ${{ inputs.cleanup_mode }}"
            echo "- Status: ${status}"
            echo "- Prettier exit code: ${prettier_code}"
            echo "- Scope: ${{ inputs.source_dir }}"
          } > "$report_md"

          echo "{\"mode\":\"format\",\"enabled\":true,\"status\":\"${status}\",\"exitCode\":${prettier_code}}" > "$report_json"
          echo "Formatting cleanup status: ${status}. Prettier exit code: ${prettier_code}."
          exit 0

      - name: Run optional ESLint auto-fix
        shell: bash
        working-directory: project
        run: |
          report_md="${REPORT_DIR}/eslint-fix-report.md"
          report_json="${REPORT_DIR}/eslint-fix-report.json"
          eslint_fix_log="${REPORT_DIR}/eslint-fix.txt"

          if [ "${{ inputs.cleanup_mode }}" != "format_lintfix" ]; then
            {
              echo "# ESLint Auto-fix"
              echo
              echo "- Mode: ${{ inputs.cleanup_mode }}"
              echo "- Status: skipped"
              echo
              echo "ESLint --fix was not requested."
            } > "$report_md"
            echo '{"enabled":false,"status":"skipped","eslintFixExitCode":0,"postFixPrettierExitCode":0}' > "$report_json"
            echo "ESLint auto-fix skipped. cleanup_mode=${{ inputs.cleanup_mode }}."
            exit 0
          fi

          if [ "${{ steps.project-deps.outputs.installed }}" != "true" ]; then
            {
              echo "# ESLint Auto-fix"
              echo
              echo "- Mode: format_lintfix"
              echo "- Status: skipped"
              echo
              echo "Project style dependencies were not installed."
            } > "$report_md"
            echo '{"enabled":true,"status":"skipped_no_dependencies","eslintFixExitCode":0,"postFixPrettierExitCode":0}' > "$report_json"
            echo "ESLint auto-fix skipped. Project style dependencies were not installed."
            exit 0
          fi

          set +e
          npx eslint **/{aura,lwc}/**/*.js --fix > "$eslint_fix_log" 2>&1
          eslint_fix_code=$?

          npx prettier --write "${{ inputs.source_dir }}/**/*.{cls,cmp,component,css,html,js,json,md,page,trigger,xml,yaml,yml}" >> "$eslint_fix_log" 2>&1
          post_fix_prettier_code=$?

          if [ "$eslint_fix_code" -eq 0 ]; then
            status="completed"
          else
            status="completed_with_remaining_lint"
          fi

          {
            echo "# ESLint Auto-fix"
            echo
            echo "- Mode: format_lintfix"
            echo "- Status: ${status}"
            echo "- ESLint --fix exit code: ${eslint_fix_code}"
            echo "- Post-fix Prettier exit code: ${post_fix_prettier_code}"
            echo
            echo "ESLint --fix may still exit non-zero when non-fixable lint problems remain."
          } > "$report_md"

          echo "{\"enabled\":true,\"status\":\"${status}\",\"eslintFixExitCode\":${eslint_fix_code},\"postFixPrettierExitCode\":${post_fix_prettier_code}}" > "$report_json"
          echo "ESLint auto-fix status: ${status}. ESLint --fix exit code: ${eslint_fix_code}. Post-fix Prettier exit code: ${post_fix_prettier_code}."
          exit 0

      - name: Run style checks after cleanup
        shell: bash
        working-directory: project
        run: |
          prettier_log="${REPORT_DIR}/prettier-after.txt"
          eslint_log="${REPORT_DIR}/eslint-after.txt"
          report_json="${REPORT_DIR}/style-checks-after.json"

          if [ "${{ steps.project-deps.outputs.installed }}" != "true" ]; then
            echo "Style checks after cleanup skipped because dependencies were not installed." > "$prettier_log"
            echo "Style checks after cleanup skipped because dependencies were not installed." > "$eslint_log"
            echo '{"prettierExitCode":0,"eslintExitCode":0,"status":"skipped_no_dependencies"}' > "$report_json"
            exit 0
          fi

          set +e
          npx prettier --check "${{ inputs.source_dir }}/**/*.{cls,cmp,component,css,html,js,json,md,page,trigger,xml,yaml,yml}" > "$prettier_log" 2>&1
          prettier_code=$?
          prettier_warnings=$(sed -E 's/\x1B\[[0-9;]*[mK]//g' "$prettier_log" | grep -c '^\[warn\]' || true)

          npm run lint > "$eslint_log" 2>&1
          eslint_code=$?
          eslint_summary=$(grep -E '[0-9]+ problems? \(' "$eslint_log" | tail -1 || true)
          eslint_problems=$(echo "$eslint_summary" | grep -Eo '[0-9]+ problems?' | awk '{print $1}')
          eslint_errors=$(echo "$eslint_summary" | grep -Eo '[0-9]+ errors?' | awk '{print $1}')
          eslint_warnings=$(echo "$eslint_summary" | grep -Eo '[0-9]+ warnings?' | awk '{print $1}')
          eslint_problems=${eslint_problems:-0}
          eslint_errors=${eslint_errors:-0}
          eslint_warnings=${eslint_warnings:-0}

          echo "{\"prettierExitCode\":${prettier_code},\"prettierWarnings\":${prettier_warnings},\"eslintExitCode\":${eslint_code},\"eslintProblems\":${eslint_problems},\"eslintErrors\":${eslint_errors},\"eslintWarnings\":${eslint_warnings},\"status\":\"completed\"}" > "$report_json"
          echo "Style checks after cleanup completed. Prettier exit code: ${prettier_code}. Prettier warnings: ${prettier_warnings}. ESLint exit code: ${eslint_code}. ESLint problems: ${eslint_problems}."
          exit 0

      - name: Save cleanup patch
        shell: bash
        working-directory: project
        run: |
          git diff --name-only > "${REPORT_DIR}/changed-files.txt"
          git diff > "${REPORT_DIR}/basic-code-cleanup.patch"
          git diff --stat > "${REPORT_DIR}/basic-code-cleanup.diffstat"
          git diff --numstat > "${REPORT_DIR}/basic-code-cleanup.numstat"
          awk '
            BEGIN { files=0; insertions=0; deletions=0 }
            {
              files += 1
              if ($1 ~ /^[0-9]+$/) insertions += $1
              if ($2 ~ /^[0-9]+$/) deletions += $2
            }
            END {
              print "diff_files=" files
              print "diff_insertions=" insertions
              print "diff_deletions=" deletions
            }
          ' "${REPORT_DIR}/basic-code-cleanup.numstat" > "${REPORT_DIR}/diff-summary.env"

      - name: Run analyzer after cleanup
        id: analyzer-after
        continue-on-error: true
        shell: bash
        working-directory: project
        run: |
          set +e
          sf code-analyzer run \
            --workspace . \
            --target "${{ inputs.source_dir }}" \
            --rule-selector Recommended \
            --output-file "${REPORT_DIR}/analyzer-after.csv" \
            --view table
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Compare analyzer results
        shell: bash
        working-directory: project
        run: |
          node ../tools/scripts/nodejs/compare-basic-cleanup-analyzer-results.mjs \
            --before "${REPORT_DIR}/analyzer-before.csv" \
            --after "${REPORT_DIR}/analyzer-after.csv" \
            --out-dir "${REPORT_DIR}" \
            --target-ref "<target-ref>" \
            --source-dir "${{ inputs.source_dir }}" \
            --before-exit-code "${{ steps.analyzer-before.outputs.exit_code }}" \
            --after-exit-code "${{ steps.analyzer-after.outputs.exit_code }}"

          cat "${REPORT_DIR}/analyzer-comparison.md"

      - name: Validate deployment in Salesforce
        id: deploy-validation
        if: ${{ inputs.run_deploy_validate }}
        shell: bash
        working-directory: project
        env:
          SF_AUTH_URL: ${{ secrets.SF_AUTH_URL }}
        run: |
          set -euo pipefail

          report_md="${REPORT_DIR}/deploy-validation-report.md"
          report_log="${REPORT_DIR}/deploy-validation.log"

          if [ -z "${SF_AUTH_URL:-}" ]; then
            status="failed"
            validate_code=1
            {
              echo "# Deploy validation"
              echo
              echo "- Status: ${status}"
              echo "- Reason: SF_AUTH_URL secret is not configured."
            } > "$report_md"
            echo "SF_AUTH_URL secret is not configured." > "$report_log"
            echo "deploy_validation_status=${status}" >> "$GITHUB_OUTPUT"
            echo "deploy_validation_exit_code=${validate_code}" >> "$GITHUB_OUTPUT"
            cat "$report_log"
            exit 0
          fi

          auth_file="$(mktemp)"
          trap 'rm -f "$auth_file"' EXIT
          printf '%s' "$SF_AUTH_URL" > "$auth_file"

          set +e
          sf org login sfdx-url --sfdx-url-file "$auth_file" --alias validation-org > "$report_log" 2>&1
          login_code=$?

          if [ "$login_code" -ne 0 ]; then
            validate_code="$login_code"
          else
            {
              echo
              echo "Running deploy validation..."
            } >> "$report_log"

            sf project deploy validate \
              --source-dir "${{ inputs.source_dir }}" \
              --target-org validation-org \
              --test-level "${{ inputs.test_level }}" \
              --wait "${{ inputs.deploy_wait_minutes }}" >> "$report_log" 2>&1
            validate_code=$?
          fi
          set -e

          if [ "$validate_code" -eq 0 ]; then
            status="passed"
          else
            status="failed"
          fi

          {
            echo "# Deploy validation"
            echo
            echo "- Status: ${status}"
            echo "- Test level: ${{ inputs.test_level }}"
            echo "- Source dir: ${{ inputs.source_dir }}"
            echo "- Exit code: ${validate_code}"
          } > "$report_md"

          echo "deploy_validation_status=${status}" >> "$GITHUB_OUTPUT"
          echo "deploy_validation_exit_code=${validate_code}" >> "$GITHUB_OUTPUT"

          cat "$report_log"
          exit 0

      - name: Push cleanup fix branch
        id: push-fix
        if: ${{ inputs.create_fix_branch && (!inputs.run_deploy_validate || steps.deploy-validation.outputs.deploy_validation_status == 'passed') }}
        shell: bash
        working-directory: project
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          summary_file="${REPORT_DIR}/comparison-summary.env"
          diff_summary_file="${REPORT_DIR}/diff-summary.env"
          changed_file="${REPORT_DIR}/changed-files.txt"
          formatting_json="${REPORT_DIR}/formatting-report.json"
          eslint_fix_json="${REPORT_DIR}/eslint-fix-report.json"

          echo "pushed=false" >> "$GITHUB_OUTPUT"
          echo "branch=" >> "$GITHUB_OUTPUT"

          if [ ! -f "$summary_file" ] || [ ! -f "$diff_summary_file" ] || [ ! -f "$changed_file" ]; then
            echo "reason=missing comparison, diff, or changed-files report" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          set -a
          . "$summary_file"
          . "$diff_summary_file"
          set +a

          changed_count="$(grep -cve '^[[:space:]]*$' "$changed_file" || true)"
          formatter_status="unknown"
          post_fix_prettier_code=0

          if [ -f "$formatting_json" ]; then
            formatter_status="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.status || 'unknown')" "$formatting_json")"
          fi

          if [ -f "$eslint_fix_json" ]; then
            post_fix_prettier_code="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.postFixPrettierExitCode ?? 0)" "$eslint_fix_json")"
          fi

          if [ "$changed_count" -eq 0 ] || [ "${diff_files:-0}" -eq 0 ]; then
            echo "reason=no files changed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${new_high_or_critical:-0}" -gt 0 ]; then
            echo "reason=new High/Critical findings detected" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$formatter_status" = "prettier_failed" ] || [ "$post_fix_prettier_code" -ne 0 ]; then
            echo "reason=formatter failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          safe_mode="$(printf '%s' "${{ inputs.cleanup_mode }}" | tr '/:@ ' '----' | tr -cd 'A-Za-z0-9._-')"
          fix_branch="${{ inputs.fix_branch_prefix }}/${safe_mode}-run-${{ github.run_number }}-${{ github.run_attempt }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$fix_branch"
          git add --pathspec-from-file="$changed_file"
          git commit --no-verify -m "Apply basic code cleanup"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push --set-upstream origin "$fix_branch"

          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$fix_branch" >> "$GITHUB_OUTPUT"
          echo "reason=fix branch pushed" >> "$GITHUB_OUTPUT"

      - name: Publish cleanup run result
        if: ${{ always() }}
        shell: bash
        working-directory: project
        env:
          FIX_BRANCH_PUSHED: ${{ steps.push-fix.outputs.pushed }}
          FIX_BRANCH_NAME: ${{ steps.push-fix.outputs.branch }}
          FIX_BRANCH_REASON: ${{ steps.push-fix.outputs.reason }}
          DEPLOY_VALIDATION_STATUS: ${{ steps.deploy-validation.outputs.deploy_validation_status }}
          DEPLOY_VALIDATION_EXIT_CODE: ${{ steps.deploy-validation.outputs.deploy_validation_exit_code }}
        run: |
          cleanup_json="${REPORT_DIR}/basic-code-cleanup-report.json"
          formatting_json="${REPORT_DIR}/formatting-report.json"
          eslint_fix_json="${REPORT_DIR}/eslint-fix-report.json"
          style_before_json="${REPORT_DIR}/style-checks-before.json"
          style_after_json="${REPORT_DIR}/style-checks-after.json"
          summary_file="${REPORT_DIR}/comparison-summary.env"
          diff_summary_file="${REPORT_DIR}/diff-summary.env"
          deploy_log="${REPORT_DIR}/deploy-validation.log"

          append_deploy_validation_summary() {
            echo "### Validação Salesforce"
            echo
            if [ "${{ inputs.run_deploy_validate }}" != "true" ]; then
              echo "- Estado: não executado."
              return
            fi

            echo "- Estado: **${DEPLOY_VALIDATION_STATUS:-failed}**"
            echo "- Exit code: **${DEPLOY_VALIDATION_EXIT_CODE:-unknown}**"

            if [ -f "$deploy_log" ]; then
              echo
              echo "<details>"
              echo "<summary>Output principal da validação</summary>"
              echo
              echo '```text'
              perl -pe 's/\e\[[0-9;?]*[A-Za-z]//g' "$deploy_log" \
                | grep -E '^(Status:|Deploy ID:|Test Failures|Passing:|Failing:|Total:|Error \(|.*Average test coverage.*|.*at least [0-9]+%.*|.*FIELD_CUSTOM_VALIDATION_EXCEPTION.*|.*CANNOT_EXECUTE_FLOW_TRIGGER.*|.*System\.AssertException.*|.*Class\..*: line .*|.*• .*)' \
                | head -n 80 || true
              echo '```'
              echo
              echo "</details>"
            else
              echo "- Output: log de validação não encontrado."
            fi
          }

          if [ -f "$cleanup_json" ]; then
            changed_files="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.changedFiles || 0)" "$cleanup_json")"
            trailing_fixed="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.trailingWhitespaceLinesFixed || 0)" "$cleanup_json")"
            final_newlines="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.finalNewlinesAdded || 0)" "$cleanup_json")"
          else
            changed_files=0
            trailing_fixed=0
            final_newlines=0
          fi

          if [ -f "$formatting_json" ]; then
            formatter_status="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.status || 'unknown')" "$formatting_json")"
            formatter_exit_code="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.exitCode ?? 0)" "$formatting_json")"
          else
            formatter_status="missing_report"
            formatter_exit_code=0
          fi

          if [ -f "$eslint_fix_json" ]; then
            eslint_fix_status="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.status || 'unknown')" "$eslint_fix_json")"
            eslint_fix_exit_code="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.eslintFixExitCode ?? 0)" "$eslint_fix_json")"
          else
            eslint_fix_status="missing_report"
            eslint_fix_exit_code=0
          fi

          if [ -f "$style_before_json" ]; then
            prettier_before="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.prettierExitCode ?? 0)" "$style_before_json")"
            prettier_warnings_before="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.prettierWarnings ?? 0)" "$style_before_json")"
            eslint_before="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.eslintExitCode ?? 0)" "$style_before_json")"
            eslint_problems_before="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.eslintProblems ?? 0)" "$style_before_json")"
            eslint_errors_before="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.eslintErrors ?? 0)" "$style_before_json")"
            eslint_warnings_before="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.eslintWarnings ?? 0)" "$style_before_json")"
          else
            prettier_before=0
            prettier_warnings_before=0
            eslint_before=0
            eslint_problems_before=0
            eslint_errors_before=0
            eslint_warnings_before=0
          fi

          if [ -f "$style_after_json" ]; then
            prettier_after="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.prettierExitCode ?? 0)" "$style_after_json")"
            prettier_warnings_after="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.prettierWarnings ?? 0)" "$style_after_json")"
            eslint_after="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.eslintExitCode ?? 0)" "$style_after_json")"
            eslint_problems_after="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.eslintProblems ?? 0)" "$style_after_json")"
            eslint_errors_after="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.eslintErrors ?? 0)" "$style_after_json")"
            eslint_warnings_after="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.eslintWarnings ?? 0)" "$style_after_json")"
          else
            prettier_after=0
            prettier_warnings_after=0
            eslint_after=0
            eslint_problems_after=0
            eslint_errors_after=0
            eslint_warnings_after=0
          fi

          if [ -f "$summary_file" ]; then
            set -a
            . "$summary_file"
            set +a
          fi

          if [ -f "$diff_summary_file" ]; then
            set -a
            . "$diff_summary_file"
            set +a
          else
            diff_files=0
            diff_insertions=0
            diff_deletions=0
          fi

          if [ "${fixed_findings:-0}" -gt 0 ]; then
            analyzer_result="Analyzer: findings reduziram neste run."
          else
            analyzer_result="Analyzer: findings não reduziram neste run."
          fi

          prettier_fixed=$((prettier_warnings_before - prettier_warnings_after))
          eslint_fixed=$((eslint_problems_before - eslint_problems_after))
          eslint_remaining="${eslint_problems_after}"
          analyzer_remaining="${total_after:-0}"
          classification_md="${REPORT_DIR}/cleanup-classification.md"
          classification_json="${REPORT_DIR}/cleanup-classification.json"
          operator_guide_md="${REPORT_DIR}/resumo-operacional.md"

          if [ "${new_high_or_critical:-0}" -gt 0 ]; then
            operator_decision="NÃO APLICAR"
            operator_reason="Surgiram novos findings High/Critical depois da limpeza."
          elif [ "${diff_files}" -gt 0 ]; then
            operator_decision="REVER PATCH"
            operator_reason="O workflow gerou um patch de limpeza para rever antes de criar PR."
          else
            operator_decision="SEM AÇÃO"
            operator_reason="Não foi gerado patch de limpeza."
          fi

          {
            echo "# Classificação da limpeza"
            echo
            echo "## Corrigido automaticamente"
            echo
            if [ "${prettier_fixed}" -gt 0 ]; then
              echo "- Warnings de formatação Prettier: **${prettier_warnings_before} -> ${prettier_warnings_after}** (${prettier_fixed} corrigidos)"
            else
              echo "- Warnings de formatação Prettier: **${prettier_warnings_before} -> ${prettier_warnings_after}**"
            fi
            echo "- Linhas com whitespace final removido: **${trailing_fixed}**"
            echo "- Final newlines adicionadas: **${final_newlines}**"
            echo "- Findings do Analyzer: **${total_before:-0} -> ${total_after:-0}**"
            if [ "${eslint_fixed}" -gt 0 ]; then
              echo "- Problemas ESLint reduzidos por auto-fix: **${eslint_problems_before} -> ${eslint_problems_after}** (${eslint_fixed} corrigidos)"
            else
              echo "- Problemas ESLint reduzidos por auto-fix: **${eslint_problems_before} -> ${eslint_problems_after}**"
            fi
            echo "- Estado do ESLint auto-fix: **${eslint_fix_status}**"
            echo "- Patch gerado para review: **${diff_files} ficheiros**, **${diff_insertions} insertions**, **${diff_deletions} deletions**"
            echo
            echo "## Ainda precisa de review manual"
            echo
            echo "- Problemas ESLint restantes: **${eslint_remaining}** (${eslint_errors_after} errors, ${eslint_warnings_after} warnings)"
            echo "- Findings Analyzer restantes: **${analyzer_remaining}**"
            echo "- Novos High/Critical introduzidos: **${new_high_or_critical:-0}**"
            echo
            echo "## Nota"
            echo
            echo "Este resultado compara apenas o estado antes/depois do run atual. Não usa API externa nem histórico entre runs."
          } > "$classification_md"

          {
            echo "# Resumo operacional"
            echo
            echo "## Decisão"
            echo
            echo "- Recomendação: **${operator_decision}**"
            echo "- Motivo: ${operator_reason}"
            echo "- Modo: \`${{ inputs.cleanup_mode }}\`"
            echo
            echo "## O que foi feito"
            echo
            echo "- Gerou patch para review."
            echo "- Criou branch de correção quando o run foi considerado seguro."
            echo "- Correu Analyzer, Prettier e ESLint antes/depois."
            echo "- Não fez merge automático nem alterou diretamente a branch alvo."
            echo
            echo "## Leitura rápida"
            echo
            echo "- \`safe\`: whitespace e final newline."
            echo "- \`format\`: safe + Prettier."
            echo "- \`format_lintfix\`: format + ESLint --fix."
            echo
            echo "## Antes de aplicar"
            echo
            echo "- Rever o patch gerado no artifact."
            echo "- Confirmar que não surgiram novos High/Critical."
            echo "- Tratar problemas ESLint restantes como trabalho separado."
          } > "$operator_guide_md"

          node -e "
            const fs = require('fs');
            const data = {
              autoFixed: {
                prettierWarningsBefore: Number(process.argv[1]),
                prettierWarningsAfter: Number(process.argv[2]),
                prettierWarningsFixed: Number(process.argv[3]),
                trailingWhitespaceLinesFixed: Number(process.argv[4]),
                finalNewlinesAdded: Number(process.argv[5]),
                analyzerFindingsFixed: Number(process.argv[6] || 0),
                eslintProblemsBefore: Number(process.argv[7]),
                eslintProblemsAfter: Number(process.argv[8]),
                eslintProblemsFixed: Number(process.argv[9]),
                eslintFixStatus: process.argv[10],
                patchFilesChanged: Number(process.argv[11]),
                patchInsertions: Number(process.argv[12]),
                patchDeletions: Number(process.argv[13])
              },
              manualReview: {
                eslintProblemsRemaining: Number(process.argv[14]),
                eslintErrorsRemaining: Number(process.argv[15]),
                eslintWarningsRemaining: Number(process.argv[16]),
                analyzerFindingsRemaining: Number(process.argv[17]),
                newHighOrCriticalFindings: Number(process.argv[18] || 0)
              },
              operatorDecision: {
                recommendation: process.argv[19],
                reason: process.argv[20]
              },
              explanation: 'Resultado calculado apenas pela comparação antes/depois do run atual. Não usa API externa nem histórico entre runs.'
            };
            fs.writeFileSync(process.argv[21], JSON.stringify(data, null, 2) + '\n');
          " \
            "${prettier_warnings_before}" \
            "${prettier_warnings_after}" \
            "${prettier_fixed}" \
            "${trailing_fixed}" \
            "${final_newlines}" \
            "${fixed_findings:-0}" \
            "${eslint_problems_before}" \
            "${eslint_problems_after}" \
            "${eslint_fixed}" \
            "${eslint_fix_status}" \
            "${diff_files}" \
            "${diff_insertions}" \
            "${diff_deletions}" \
            "${eslint_remaining}" \
            "${eslint_errors_after}" \
            "${eslint_warnings_after}" \
            "${analyzer_remaining}" \
            "${new_high_or_critical:-0}" \
            "${operator_decision}" \
            "${operator_reason}" \
            "$classification_json"

          echo "Resultado da limpeza"
          echo "Decisão: ${operator_decision}"
          echo "Motivo: ${operator_reason}"
          echo "${analyzer_result}"
          echo "Modo: ${{ inputs.cleanup_mode }}"
          echo "Patch: ${diff_files} ficheiros"
          echo "Prettier warnings: ${prettier_warnings_before} -> ${prettier_warnings_after}"
          echo "ESLint problems: ${eslint_problems_before} -> ${eslint_problems_after}"
          echo "Analyzer findings: ${total_before:-0} -> ${total_after:-0}"
          echo "Novos High/Critical: ${new_high_or_critical:-0}"
          echo "::notice title=Resultado da limpeza::${operator_decision}. ${analyzer_result} Patch: ${diff_files} ficheiros. Prettier: ${prettier_warnings_before}->${prettier_warnings_after}. ESLint: ${eslint_problems_before}->${eslint_problems_after}. Analyzer: ${total_before:-0}->${total_after:-0}. Novos High/Critical: ${new_high_or_critical:-0}."

          {
            echo "## Resultado da limpeza"
            echo
            echo "### Decisão"
            echo
            echo "**${operator_decision}**"
            echo
            echo "${operator_reason}"
            echo
            echo "**${analyzer_result}**"
            echo
            echo "| Métrica | Antes | Depois |"
            echo "| --- | ---: | ---: |"
            echo "| Prettier warnings | ${prettier_warnings_before} | ${prettier_warnings_after} |"
            echo "| ESLint problems | ${eslint_problems_before} | ${eslint_problems_after} |"
            echo "| Analyzer findings | ${total_before:-0} | ${total_after:-0} |"
            echo "| Novos High/Critical | 0 | ${new_high_or_critical:-0} |"
            echo
            echo "### Patch"
            echo
            echo "- Ficheiros alterados: **${diff_files}**"
            echo "- Whitespace final removido: **${trailing_fixed}**"
            echo "- Final newlines adicionadas: **${final_newlines}**"
            if [ "${FIX_BRANCH_PUSHED}" = "true" ]; then
              echo "- Branch de correção criada: \`${FIX_BRANCH_NAME}\`"
            elif [ "${{ inputs.run_deploy_validate }}" = "true" ] && [ "${DEPLOY_VALIDATION_STATUS:-failed}" != "passed" ]; then
              echo "- Branch de correção criada: não."
              echo "- Motivo: deploy validation falhou."
            else
              echo "- Branch de correção criada: não."
              echo "- Motivo: ${FIX_BRANCH_REASON:-não aplicável}."
            fi
            if [ "${{ inputs.run_deploy_validate }}" = "true" ]; then
              echo "- Deploy validation: ${DEPLOY_VALIDATION_STATUS:-failed}."
            else
              echo "- Deploy validation: não executado."
            fi
            echo
            append_deploy_validation_summary
            echo
            cat "$operator_guide_md"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: List generated reports
        if: ${{ always() }}
        shell: bash
        working-directory: project
        run: |
          find docs/basic-code-cleanup-guard -maxdepth 1 -type f -print | sort || true

      - name: Sanitize report paths
        if: ${{ always() }}
        shell: bash
        working-directory: project
        run: |
          export PROJECT_ROOT="$(pwd)"
          export WORKSPACE_ROOT="${GITHUB_WORKSPACE}"

          find "${REPORT_DIR}" -type f \( \
            -name "*.csv" -o \
            -name "*.json" -o \
            -name "*.md" -o \
            -name "*.txt" \
          \) -print0 | while IFS= read -r -d '' file; do
            perl -0pi -e 's#\Q$ENV{PROJECT_ROOT}\E/?##g; s#\Q$ENV{WORKSPACE_ROOT}\E/?##g' "$file"
          done

      - name: Upload basic cleanup artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: basic-code-cleanup-guard-${{ github.run_number }}
          path: |
            project/docs/basic-code-cleanup-guard/basic-code-cleanup-report.md
            project/docs/basic-code-cleanup-guard/basic-code-cleanup-report.json
            project/docs/basic-code-cleanup-guard/style-dependencies-report.md
            project/docs/basic-code-cleanup-guard/style-dependencies-report.json
            project/docs/basic-code-cleanup-guard/formatting-report.md
            project/docs/basic-code-cleanup-guard/formatting-report.json
            project/docs/basic-code-cleanup-guard/eslint-fix-report.md
            project/docs/basic-code-cleanup-guard/eslint-fix-report.json
            project/docs/basic-code-cleanup-guard/eslint-fix.txt
            project/docs/basic-code-cleanup-guard/prettier-before.txt
            project/docs/basic-code-cleanup-guard/prettier-after.txt
            project/docs/basic-code-cleanup-guard/eslint-before.txt
            project/docs/basic-code-cleanup-guard/eslint-after.txt
            project/docs/basic-code-cleanup-guard/style-checks-before.json
            project/docs/basic-code-cleanup-guard/style-checks-after.json
            project/docs/basic-code-cleanup-guard/cleanup-classification.md
            project/docs/basic-code-cleanup-guard/cleanup-classification.json
            project/docs/basic-code-cleanup-guard/resumo-operacional.md
            project/docs/basic-code-cleanup-guard/basic-code-cleanup.patch
            project/docs/basic-code-cleanup-guard/basic-code-cleanup.diffstat
            project/docs/basic-code-cleanup-guard/basic-code-cleanup.numstat
            project/docs/basic-code-cleanup-guard/diff-summary.env
            project/docs/basic-code-cleanup-guard/changed-files.txt
            project/docs/basic-code-cleanup-guard/analyzer-before.csv
            project/docs/basic-code-cleanup-guard/analyzer-after.csv
            project/docs/basic-code-cleanup-guard/analyzer-comparison.md
            project/docs/basic-code-cleanup-guard/analyzer-comparison.json
            project/docs/basic-code-cleanup-guard/comparison-summary.env
            project/docs/basic-code-cleanup-guard/deploy-validation-report.md
            project/docs/basic-code-cleanup-guard/deploy-validation.log
          if-no-files-found: warn

      - name: Fail if deploy validation failed
        if: ${{ inputs.run_deploy_validate && steps.deploy-validation.outputs.deploy_validation_status != 'passed' }}
        shell: bash
        run: |
          echo "Deploy validation failed. Check deploy-validation.log in the uploaded artifact."
          exit 1
