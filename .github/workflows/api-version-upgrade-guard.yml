name: API Version Upgrade Guard
run-name: "API version guard (${{ inputs.target_api_version }})"

on:
  workflow_dispatch:
    inputs:
      target_api_version:
        description: "Target Salesforce API version, for example 66.0"
        required: true
        default: "66.0"
        type: string
      source_dir:
        description: "Salesforce source directory"
        required: true
        default: "force-app"
        type: string
      target_ref:
        description: "Branch or ref containing the Salesforce project to test"
        required: true
        default: "main"
        type: string
      create_fix_branch:
        description: "Create and push a branch with safe automated fixes"
        required: true
        default: true
        type: boolean
      fix_branch_prefix:
        description: "Prefix for the generated fix branch"
        required: true
        default: "auto/api-version-upgrade"
        type: string
      run_deploy_validate:
        description: "Validate deployment in Salesforce before pushing the fix branch"
        required: true
        default: true
        type: boolean
      test_level:
        description: "Salesforce deploy validation test level"
        required: true
        default: "RunLocalTests"
        type: choice
        options:
          - NoTestRun
          - RunLocalTests
          - RunAllTestsInOrg
      deploy_wait_minutes:
        description: "Minutes to wait for Salesforce deploy validation"
        required: true
        default: "30"
        type: string

permissions:
  contents: write

env:
  SF_CLI_VERSION: "2.133.4"
  SF_CODE_ANALYZER_VERSION: "5.13.0"
  REPORT_DIR: "docs/api-version-upgrade-guard"

jobs:
  api-version-upgrade-guard:
    name: Test API version upgrade
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout workflow tools
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: tools
          submodules: false
          persist-credentials: false

      - name: Checkout target project
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git clone \
            --no-recurse-submodules \
            --branch "${{ inputs.target_ref }}" \
            --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
            project

          git -C project remote set-url origin "https://github.com/${{ github.repository }}.git"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Salesforce CLI
        shell: bash
        run: npm install --global @salesforce/cli@${SF_CLI_VERSION}

      - name: Install Salesforce Code Analyzer plugin
        shell: bash
        run: sf plugins install code-analyzer@${SF_CODE_ANALYZER_VERSION}

      - name: Prepare report directory
        shell: bash
        working-directory: project
        run: |
          mkdir -p "${REPORT_DIR}"
          rm -f "${REPORT_DIR}"/*

      - name: Run analyzer before API version update
        id: analyzer-before
        continue-on-error: true
        shell: bash
        working-directory: project
        run: |
          set +e
          sf code-analyzer run \
            --workspace . \
            --target "${{ inputs.source_dir }}" \
            --rule-selector Recommended \
            --output-file "${REPORT_DIR}/analyzer-before.csv" \
            --view table
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Apply API version update in runner
        id: api-version-guard
        shell: bash
        working-directory: project
        run: |
          node ../tools/scripts/nodejs/api-version-upgrade-guard.mjs \
            --target-api "${{ inputs.target_api_version }}" \
            --source-dir "${{ inputs.source_dir }}" \
            --report "${REPORT_DIR}/api-version-upgrade-report.md" \
            --json "${REPORT_DIR}/api-version-upgrade-report.json"

      - name: Verify only API version files changed
        shell: pwsh
        working-directory: project
        run: |
          $reportDir = $env:REPORT_DIR
          git diff --name-only | Set-Content "$reportDir/changed-files.txt"

          $report = Get-Content "$reportDir/api-version-upgrade-report.json" -Raw | ConvertFrom-Json
          $temporaryFiles = @($report.temporaryFiles)
          $invalid = New-Object System.Collections.Generic.List[string]

          $changedFiles = @(Get-Content "$reportDir/changed-files.txt" | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })

          foreach ($file in $changedFiles) {
            if ($file -eq "sfdx-project.json") {
              if ($temporaryFiles -contains "sfdx-project.json") {
                continue
              }

              $changedLines = @(git diff --unified=0 -- "$file" | Where-Object {
                ($_ -match '^[+-]') -and
                ($_ -notmatch '^\+\+\+|^---') -and
                ($_ -notmatch '"sourceApiVersion"')
              })

              if ($changedLines.Count -gt 0) {
                $invalid.Add("$file changed content other than sourceApiVersion.")
              }
              continue
            }

            if ($file -like "*-meta.xml") {
              $changedLines = @(git diff --unified=0 -- "$file" | Where-Object {
                ($_ -match '^[+-]') -and
                ($_ -notmatch '^\+\+\+|^---') -and
                ($_ -notmatch '<apiVersion>')
              })

              if ($changedLines.Count -gt 0) {
                $invalid.Add("$file changed XML content outside apiVersion.")
              }
              continue
            }

            $invalid.Add("Unexpected changed file: $file")
          }

          if ($invalid.Count -gt 0) {
            $invalid | Set-Content "$reportDir/invalid-diff.txt"
            $invalid | ForEach-Object { Write-Error $_ }
            exit 1
          }

          "Diff validation passed. Only API version content changed." | Set-Content "$reportDir/diff-validation.txt"

      - name: Save API version patch
        shell: bash
        working-directory: project
        run: |
          git diff > "${REPORT_DIR}/api-version-upgrade-full.patch"
          git diff -- . ':(exclude)sfdx-project.json' > "${REPORT_DIR}/api-version-upgrade-real.patch"
          cp "${REPORT_DIR}/api-version-upgrade-real.patch" "${REPORT_DIR}/api-version-upgrade.patch"

      - name: Run analyzer after API version update
        id: analyzer-after
        continue-on-error: true
        shell: bash
        working-directory: project
        run: |
          set +e
          sf code-analyzer run \
            --workspace . \
            --target "${{ inputs.source_dir }}" \
            --rule-selector Recommended \
            --output-file "${REPORT_DIR}/analyzer-after.csv" \
            --view table
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Compare analyzer results
        id: compare
        shell: bash
        working-directory: project
        run: |
          node ../tools/scripts/nodejs/compare-api-version-analyzer-results.mjs \
            --before "${REPORT_DIR}/analyzer-before.csv" \
            --after "${REPORT_DIR}/analyzer-after.csv" \
            --out-dir "${REPORT_DIR}" \
            --target-api "${{ inputs.target_api_version }}" \
            --target-ref "<target-ref>" \
            --source-dir "${{ inputs.source_dir }}" \
            --before-exit-code "${{ steps.analyzer-before.outputs.exit_code }}" \
            --after-exit-code "${{ steps.analyzer-after.outputs.exit_code }}"

          cat "${REPORT_DIR}/analyzer-comparison.md"

      - name: Validate deployment in Salesforce
        id: deploy-validation
        if: ${{ inputs.run_deploy_validate }}
        shell: bash
        working-directory: project
        env:
          SF_AUTH_URL: ${{ secrets.SF_AUTH_URL }}
        run: |
          set -euo pipefail

          report_md="${REPORT_DIR}/deploy-validation-report.md"
          report_log="${REPORT_DIR}/deploy-validation.log"

          if [ -z "${SF_AUTH_URL:-}" ]; then
            status="failed"
            validate_code=1
            {
              echo "# Deploy validation"
              echo
              echo "- Status: ${status}"
              echo "- Reason: SF_AUTH_URL secret is not configured."
            } > "$report_md"
            echo "SF_AUTH_URL secret is not configured." > "$report_log"
            echo "deploy_validation_status=${status}" >> "$GITHUB_OUTPUT"
            echo "deploy_validation_exit_code=${validate_code}" >> "$GITHUB_OUTPUT"
            cat "$report_log"
            exit 0
          fi

          auth_file="$(mktemp)"
          trap 'rm -f "$auth_file"' EXIT
          printf '%s' "$SF_AUTH_URL" > "$auth_file"

          set +e
          sf org login sfdx-url --sfdx-url-file "$auth_file" --alias validation-org > "$report_log" 2>&1
          login_code=$?

          if [ "$login_code" -ne 0 ]; then
            validate_code="$login_code"
          else
            {
              echo
              echo "Running deploy validation..."
            } >> "$report_log"

            sf project deploy validate \
              --source-dir "${{ inputs.source_dir }}" \
              --target-org validation-org \
              --test-level "${{ inputs.test_level }}" \
              --wait "${{ inputs.deploy_wait_minutes }}" >> "$report_log" 2>&1
            validate_code=$?
          fi
          set -e

          if [ "$validate_code" -eq 0 ]; then
            status="passed"
          else
            status="failed"
          fi

          {
            echo "# Deploy validation"
            echo
            echo "- Status: ${status}"
            echo "- Test level: ${{ inputs.test_level }}"
            echo "- Source dir: ${{ inputs.source_dir }}"
            echo "- Exit code: ${validate_code}"
          } > "$report_md"

          echo "deploy_validation_status=${status}" >> "$GITHUB_OUTPUT"
          echo "deploy_validation_exit_code=${validate_code}" >> "$GITHUB_OUTPUT"

          cat "$report_log"
          exit 0

      - name: Push API version fix branch
        id: push-fix
        if: ${{ inputs.create_fix_branch && (!inputs.run_deploy_validate || steps.deploy-validation.outputs.deploy_validation_status == 'passed') }}
        shell: bash
        working-directory: project
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          summary_file="${REPORT_DIR}/comparison-summary.env"
          changed_file="${REPORT_DIR}/changed-files.txt"

          echo "pushed=false" >> "$GITHUB_OUTPUT"
          echo "branch=" >> "$GITHUB_OUTPUT"

          if [ ! -f "$summary_file" ] || [ ! -f "$changed_file" ]; then
            echo "reason=missing comparison or changed-files report" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          set -a
          . "$summary_file"
          set +a

          changed_count="$(grep -cve '^[[:space:]]*$' "$changed_file" || true)"

          if [ "$changed_count" -eq 0 ]; then
            echo "reason=no files changed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${new_high_or_critical:-0}" -gt 0 ]; then
            echo "reason=new High/Critical findings detected" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          fix_branch="${{ inputs.fix_branch_prefix }}/run-${{ github.run_number }}-${{ github.run_attempt }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$fix_branch"
          git add --pathspec-from-file="$changed_file"
          git commit --no-verify -m "Apply API version cleanup"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push --set-upstream origin "$fix_branch"

          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$fix_branch" >> "$GITHUB_OUTPUT"
          echo "reason=fix branch pushed" >> "$GITHUB_OUTPUT"

      - name: Publish API version run result
        if: ${{ always() }}
        shell: bash
        working-directory: project
        env:
          FIX_BRANCH_PUSHED: ${{ steps.push-fix.outputs.pushed }}
          FIX_BRANCH_NAME: ${{ steps.push-fix.outputs.branch }}
          FIX_BRANCH_REASON: ${{ steps.push-fix.outputs.reason }}
          DEPLOY_VALIDATION_STATUS: ${{ steps.deploy-validation.outputs.deploy_validation_status }}
          DEPLOY_VALIDATION_EXIT_CODE: ${{ steps.deploy-validation.outputs.deploy_validation_exit_code }}
        run: |
          summary_file="${REPORT_DIR}/comparison-summary.env"
          deploy_log="${REPORT_DIR}/deploy-validation.log"

          append_deploy_validation_summary() {
            echo "### Validação Salesforce"
            echo
            if [ "${{ inputs.run_deploy_validate }}" != "true" ]; then
              echo "- Estado: não executado."
              return
            fi

            echo "- Estado: **${DEPLOY_VALIDATION_STATUS:-failed}**"
            echo "- Exit code: **${DEPLOY_VALIDATION_EXIT_CODE:-unknown}**"

            if [ -f "$deploy_log" ]; then
              echo
              echo "<details>"
              echo "<summary>Output principal da validação</summary>"
              echo
              echo '```text'
              perl -pe 's/\e\[[0-9;?]*[A-Za-z]//g' "$deploy_log" \
                | grep -E '^(Status:|Deploy ID:|Test Failures|Passing:|Failing:|Total:|Error \(|.*Average test coverage.*|.*at least [0-9]+%.*|.*FIELD_CUSTOM_VALIDATION_EXCEPTION.*|.*CANNOT_EXECUTE_FLOW_TRIGGER.*|.*System\.AssertException.*|.*Class\..*: line .*|.*• .*)' \
                | head -n 80 || true
              echo '```'
              echo
              echo "</details>"
            else
              echo "- Output: log de validação não encontrado."
            fi
          }

          if [ ! -f "$summary_file" ]; then
            {
              echo "## Resultado do versionamento de API"
              echo
              echo "A comparação antes/depois não foi gerada. Rever os steps anteriores."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          set -a
          . "$summary_file"
          set +a

          if [ "${new_high_or_critical:-0}" -gt 0 ]; then
            decision="NÃO APLICAR"
            reason="Surgiram novos findings High/Critical depois da alteração."
          elif [ "${api_version_fixed:-0}" -gt 0 ]; then
            decision="REVER PATCH"
            reason="Findings relacionados com API version reduziram neste run."
          elif [ "${fixed_findings:-0}" -gt 0 ]; then
            decision="REVER PATCH"
            reason="Findings do Analyzer reduziram neste run."
          else
            decision="SEM AÇÃO"
            reason="Não houve redução de findings neste run."
          fi

          echo "Resultado do versionamento de API"
          echo "Decisão: ${decision}"
          echo "Motivo: ${reason}"
          echo "API version findings: ${api_version_before:-0} -> ${api_version_after:-0}"
          echo "Analyzer findings: ${total_before:-0} -> ${total_after:-0}"
          echo "Novos High/Critical: ${new_high_or_critical:-0}"
          echo "::notice title=Resultado API version::${decision}. ${reason} API version: ${api_version_before:-0}->${api_version_after:-0}. Analyzer: ${total_before:-0}->${total_after:-0}. Novos High/Critical: ${new_high_or_critical:-0}."

          {
            echo "## Resultado do versionamento de API"
            echo
            echo "### Decisão"
            echo
            echo "**${decision}**"
            echo
            echo "${reason}"
            echo
            echo "| Métrica | Antes | Depois |"
            echo "| --- | ---: | ---: |"
            echo "| API version findings | ${api_version_before:-0} | ${api_version_after:-0} |"
            echo "| Analyzer findings | ${total_before:-0} | ${total_after:-0} |"
            echo "| Novos findings | 0 | ${new_findings:-0} |"
            echo "| Novos High/Critical | 0 | ${new_high_or_critical:-0} |"
            echo
            echo "### Patch"
            echo
            if [ "${FIX_BRANCH_PUSHED}" = "true" ]; then
              echo "- Branch de correção criada: \`${FIX_BRANCH_NAME}\`"
            elif [ "${{ inputs.run_deploy_validate }}" = "true" ] && [ "${DEPLOY_VALIDATION_STATUS:-failed}" != "passed" ]; then
              echo "- Branch de correção criada: não."
              echo "- Motivo: deploy validation falhou."
            else
              echo "- Branch de correção criada: não."
              echo "- Motivo: ${FIX_BRANCH_REASON:-não aplicável}."
            fi
            if [ "${{ inputs.run_deploy_validate }}" = "true" ]; then
              echo "- Deploy validation: ${DEPLOY_VALIDATION_STATUS:-failed}."
            else
              echo "- Deploy validation: não executado."
            fi
            echo
            append_deploy_validation_summary
            echo
            echo "- Não faz merge automático nem altera diretamente a branch alvo."
            echo "- O resultado compara apenas o estado antes/depois do run atual. Não usa API externa nem histórico entre runs."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: List generated reports
        if: ${{ always() }}
        shell: bash
        working-directory: project
        run: |
          find docs/api-version-upgrade-guard -maxdepth 1 -type f -print | sort || true

      - name: Sanitize report paths
        if: ${{ always() }}
        shell: bash
        working-directory: project
        run: |
          export PROJECT_ROOT="$(pwd)"
          export WORKSPACE_ROOT="${GITHUB_WORKSPACE}"

          find "${REPORT_DIR}" -type f \( \
            -name "*.csv" -o \
            -name "*.json" -o \
            -name "*.md" -o \
            -name "*.txt" -o \
            -name "*.html" \
          \) -print0 | while IFS= read -r -d '' file; do
            perl -0pi -e 's#\Q$ENV{PROJECT_ROOT}\E/?##g; s#\Q$ENV{WORKSPACE_ROOT}\E/?##g' "$file"
          done

      - name: Upload API version guard artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: api-version-upgrade-guard-${{ github.run_number }}
          path: |
            project/docs/api-version-upgrade-guard/api-version-upgrade-report.md
            project/docs/api-version-upgrade-guard/api-version-upgrade-report.json
            project/docs/api-version-upgrade-guard/api-version-upgrade.patch
            project/docs/api-version-upgrade-guard/api-version-upgrade-full.patch
            project/docs/api-version-upgrade-guard/api-version-upgrade-real.patch
            project/docs/api-version-upgrade-guard/changed-files.txt
            project/docs/api-version-upgrade-guard/diff-validation.txt
            project/docs/api-version-upgrade-guard/invalid-diff.txt
            project/docs/api-version-upgrade-guard/analyzer-before.csv
            project/docs/api-version-upgrade-guard/analyzer-after.csv
            project/docs/api-version-upgrade-guard/analyzer-comparison.md
            project/docs/api-version-upgrade-guard/analyzer-comparison.json
            project/docs/api-version-upgrade-guard/comparison-summary.env
            project/docs/api-version-upgrade-guard/api-version-upgrade-summary.html
            project/docs/api-version-upgrade-guard/deploy-validation-report.md
            project/docs/api-version-upgrade-guard/deploy-validation.log
          if-no-files-found: warn

      - name: Fail if deploy validation failed
        if: ${{ inputs.run_deploy_validate && steps.deploy-validation.outputs.deploy_validation_status != 'passed' }}
        shell: bash
        run: |
          echo "Deploy validation failed. Check deploy-validation.log in the uploaded artifact."
          exit 1
