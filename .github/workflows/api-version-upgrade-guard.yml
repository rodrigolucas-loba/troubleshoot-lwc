name: API Version Upgrade Guard
run-name: "API version guard (${{ inputs.target_api_version }})"

on:
  workflow_dispatch:
    inputs:
      target_api_version:
        description: "Use auto for the latest version supported by the validation org, or provide an explicit version"
        required: true
        default: "auto"
        type: string
      source_dir:
        description: "Salesforce source directory"
        required: true
        default: "force-app"
        type: string
      target_ref:
        description: "Branch or ref containing the Salesforce project to test"
        required: true
        default: "main"
        type: string
      create_fix_branch:
        description: "Create and push a branch with safe automated fixes"
        required: true
        default: true
        type: boolean
      create_pull_request:
        description: "Open a pull request when a fix branch is pushed"
        required: true
        default: true
        type: boolean
      draft_pull_request:
        description: "Create the automated pull request as draft so external quality gates can be reviewed first"
        required: true
        default: true
        type: boolean
      fix_branch_prefix:
        description: "Prefix for the generated fix branch"
        required: true
        default: "auto/api-version"
        type: string
      run_deploy_validate:
        description: "Validate deployment in Salesforce before pushing the fix branch"
        required: true
        default: true
        type: boolean
      enforce_deploy_validation:
        description: "Fail the workflow and block the fix branch when Salesforce deploy validation fails"
        required: true
        default: true
        type: boolean
      test_level:
        description: "Salesforce deploy validation test level"
        required: true
        default: "RunRelevantTests"
        type: choice
        options:
          - RunRelevantTests
          - RunLocalTests
          - RunAllTestsInOrg
      deploy_wait_minutes:
        description: "Minutes to wait for Salesforce deploy validation"
        required: true
        default: "30"
        type: string

permissions:
  contents: write
  pull-requests: write
  statuses: write

env:
  SF_CLI_VERSION: "2.133.4"
  SF_CODE_ANALYZER_VERSION: "5.13.0"
  REPORT_DIR: "docs/api-version-upgrade-guard"
  INPUT_TARGET_API_VERSION: ${{ inputs.target_api_version }}
  INPUT_SOURCE_DIR: ${{ inputs.source_dir }}
  INPUT_TARGET_REF: ${{ inputs.target_ref }}
  INPUT_TEST_LEVEL: ${{ inputs.test_level }}
  INPUT_DEPLOY_WAIT_MINUTES: ${{ inputs.deploy_wait_minutes }}
  INPUT_FIX_BRANCH_PREFIX: ${{ inputs.fix_branch_prefix }}
  INPUT_RUN_DEPLOY_VALIDATE: ${{ inputs.run_deploy_validate }}
  INPUT_ENFORCE_DEPLOY_VALIDATION: ${{ inputs.enforce_deploy_validation }}

jobs:
  api-version-upgrade-guard:
    name: Test API version upgrade
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout workflow tools
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: tools
          submodules: false
          persist-credentials: false

      - name: Checkout target project
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git clone \
            --no-recurse-submodules \
            --branch "$INPUT_TARGET_REF" \
            --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
            project

          git -C project remote set-url origin "https://github.com/${{ github.repository }}.git"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Test API version guard tools
        working-directory: tools
        run: npm test

      - name: Install Salesforce CLI
        shell: bash
        run: npm install --global @salesforce/cli@${SF_CLI_VERSION}

      - name: Install Salesforce Code Analyzer plugin
        shell: bash
        run: sf plugins install code-analyzer@${SF_CODE_ANALYZER_VERSION}

      - name: Prepare report directory
        shell: bash
        working-directory: project
        run: |
          mkdir -p "${REPORT_DIR}"
          rm -f "${REPORT_DIR}"/*

      - name: Resolve target API version from validation org
        id: resolve-api
        shell: bash
        working-directory: project
        env:
          SF_AUTH_URL: ${{ secrets.SF_AUTH_URL }}
        run: |
          set -euo pipefail

          if [ -z "${SF_AUTH_URL:-}" ]; then
            echo "SF_AUTH_URL is required to resolve and verify the target API version." >&2
            exit 1
          fi

          auth_file="$(mktemp)"
          trap 'rm -f "$auth_file"' EXIT
          printf '%s' "$SF_AUTH_URL" > "$auth_file"
          sf org login sfdx-url \
            --sfdx-url-file "$auth_file" \
            --alias validation-org \
            > "${REPORT_DIR}/api-version-auth.log" 2>&1

          sf api request rest "/services/data/" \
            --target-org validation-org \
            > "${REPORT_DIR}/salesforce-supported-api-versions.json"

          node ../tools/scripts/nodejs/resolve-salesforce-api-version.mjs \
            --requested "$INPUT_TARGET_API_VERSION" \
            --project "sfdx-project.json" \
            --versions-json "${REPORT_DIR}/salesforce-supported-api-versions.json" \
            --json "${REPORT_DIR}/api-version-resolution.json" \
            --markdown "${REPORT_DIR}/api-version-resolution.md"

      - name: Run analyzer before API version update
        id: analyzer-before
        continue-on-error: true
        shell: bash
        working-directory: project
        run: |
          set +e
          sf code-analyzer run \
            --workspace . \
            --target "$INPUT_SOURCE_DIR" \
            --rule-selector Recommended \
            --output-file "${REPORT_DIR}/analyzer-before.csv" \
            --view table
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Apply API version update in runner
        id: api-version-guard
        shell: bash
        working-directory: project
        env:
          RESOLVED_TARGET_API_VERSION: ${{ steps.resolve-api.outputs.target_api_version }}
        run: |
          node ../tools/scripts/nodejs/api-version-upgrade-guard.mjs \
            --target-api "$RESOLVED_TARGET_API_VERSION" \
            --source-dir "$INPUT_SOURCE_DIR" \
            --report "${REPORT_DIR}/api-version-upgrade-report.md" \
            --json "${REPORT_DIR}/api-version-upgrade-report.json"

      - name: Verify only API version files changed
        shell: pwsh
        working-directory: project
        run: |
          $reportDir = $env:REPORT_DIR
          $changedFilesPath = "$reportDir/changed-files.txt"
          $changedNames = @(git diff --name-only | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
          New-Item -ItemType File -Path $changedFilesPath -Force | Out-Null
          Set-Content -Path $changedFilesPath -Value $changedNames

          $report = Get-Content "$reportDir/api-version-upgrade-report.json" -Raw | ConvertFrom-Json
          $temporaryFiles = @($report.temporaryFiles)
          $invalid = New-Object System.Collections.Generic.List[string]

          $changedFiles = @(Get-Content $changedFilesPath | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })

          foreach ($file in $changedFiles) {
            if ($file -eq "sfdx-project.json") {
              if ($temporaryFiles -contains "sfdx-project.json") {
                continue
              }

              $changedLines = @(git diff --unified=0 -- "$file" | Where-Object {
                ($_ -match '^[+-]') -and
                ($_ -notmatch '^\+\+\+|^---') -and
                ($_ -notmatch '"sourceApiVersion"')
              })

              if ($changedLines.Count -gt 0) {
                $invalid.Add("$file changed content other than sourceApiVersion.")
              }
              continue
            }

            if ($file -like "*-meta.xml") {
              $changedLines = @(git diff --unified=0 -- "$file" | Where-Object {
                ($_ -match '^[+-]') -and
                ($_ -notmatch '^\+\+\+|^---') -and
                ($_ -notmatch '<apiVersion>')
              })

              if ($changedLines.Count -gt 0) {
                $invalid.Add("$file changed XML content outside apiVersion.")
              }
              continue
            }

            $invalid.Add("Unexpected changed file: $file")
          }

          if ($invalid.Count -gt 0) {
            $invalid | Set-Content "$reportDir/invalid-diff.txt"
            $invalid | ForEach-Object { Write-Error $_ }
            exit 1
          }

          "Diff validation passed. Only API version content changed." | Set-Content "$reportDir/diff-validation.txt"

      - name: Save API version patch
        shell: bash
        working-directory: project
        run: |
          git diff > "${REPORT_DIR}/api-version-upgrade-full.patch"
          git diff -- . ':(exclude)sfdx-project.json' > "${REPORT_DIR}/api-version-upgrade-real.patch"
          cp "${REPORT_DIR}/api-version-upgrade-real.patch" "${REPORT_DIR}/api-version-upgrade.patch"

      - name: Run analyzer after API version update
        id: analyzer-after
        continue-on-error: true
        shell: bash
        working-directory: project
        run: |
          set +e
          sf code-analyzer run \
            --workspace . \
            --target "$INPUT_SOURCE_DIR" \
            --rule-selector Recommended \
            --output-file "${REPORT_DIR}/analyzer-after.csv" \
            --view table
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Compare analyzer results
        id: compare
        shell: bash
        working-directory: project
        env:
          RESOLVED_TARGET_API_VERSION: ${{ steps.resolve-api.outputs.target_api_version }}
        run: |
          node ../tools/scripts/nodejs/compare-api-version-analyzer-results.mjs \
            --before "${REPORT_DIR}/analyzer-before.csv" \
            --after "${REPORT_DIR}/analyzer-after.csv" \
            --out-dir "${REPORT_DIR}" \
            --target-api "$RESOLVED_TARGET_API_VERSION" \
            --target-ref "$INPUT_TARGET_REF" \
            --source-dir "$INPUT_SOURCE_DIR" \
            --before-exit-code "${{ steps.analyzer-before.outputs.exit_code }}" \
            --after-exit-code "${{ steps.analyzer-after.outputs.exit_code }}"

          cat "${REPORT_DIR}/analyzer-comparison.md"

      - name: Validate deployment in Salesforce
        id: deploy-validation
        if: ${{ inputs.run_deploy_validate }}
        shell: bash
        working-directory: project
        env:
          SF_AUTH_URL: ${{ secrets.SF_AUTH_URL }}
        run: |
          set -euo pipefail

          report_md="${REPORT_DIR}/deploy-validation-report.md"
          report_log="${REPORT_DIR}/deploy-validation.log"

          if [ -z "${SF_AUTH_URL:-}" ]; then
            status="failed"
            validate_code=1
            {
              echo "# Deploy validation"
              echo
              echo "- Status: ${status}"
              echo "- Reason: SF_AUTH_URL secret is not configured."
            } > "$report_md"
            echo "SF_AUTH_URL secret is not configured." > "$report_log"
            echo "deploy_validation_status=${status}" >> "$GITHUB_OUTPUT"
            echo "deploy_validation_exit_code=${validate_code}" >> "$GITHUB_OUTPUT"
            cat "$report_log"
            exit 0
          fi

          auth_file="$(mktemp)"
          trap 'rm -f "$auth_file"' EXIT
          printf '%s' "$SF_AUTH_URL" > "$auth_file"

          set +e
          sf org login sfdx-url --sfdx-url-file "$auth_file" --alias validation-org > "$report_log" 2>&1
          login_code=$?

          if [ "$login_code" -ne 0 ]; then
            validate_code="$login_code"
          else
            {
              echo
              echo "Running deploy validation..."
            } >> "$report_log"

            sf project deploy validate \
              --source-dir "$INPUT_SOURCE_DIR" \
              --target-org validation-org \
              --test-level "$INPUT_TEST_LEVEL" \
              --wait "$INPUT_DEPLOY_WAIT_MINUTES" >> "$report_log" 2>&1
            validate_code=$?
          fi
          set -e

          if [ "$validate_code" -eq 0 ]; then
            status="passed"
          else
            status="failed"
          fi

          {
            echo "# Deploy validation"
            echo
            echo "- Status: ${status}"
            echo "- Test level: $INPUT_TEST_LEVEL"
            echo "- Source dir: $INPUT_SOURCE_DIR"
            echo "- Exit code: ${validate_code}"
          } > "$report_md"

          echo "deploy_validation_status=${status}" >> "$GITHUB_OUTPUT"
          echo "deploy_validation_exit_code=${validate_code}" >> "$GITHUB_OUTPUT"

          cat "$report_log"
          exit 0

      - name: Push API version fix branch
        id: push-fix
        if: ${{ inputs.create_fix_branch && (!inputs.enforce_deploy_validation || !inputs.run_deploy_validate || steps.deploy-validation.outputs.deploy_validation_status == 'passed') }}
        shell: bash
        working-directory: project
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          summary_file="${REPORT_DIR}/comparison-summary.env"
          changed_file="${REPORT_DIR}/changed-files.txt"

          if [ ! -f "$summary_file" ] || [ ! -f "$changed_file" ]; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "branch=" >> "$GITHUB_OUTPUT"
            echo "reason=missing comparison or changed-files report" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          set -a
          . "$summary_file"
          set +a

          changed_count="$(grep -cve '^[[:space:]]*$' "$changed_file" || true)"

          if [ "$changed_count" -eq 0 ]; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "branch=" >> "$GITHUB_OUTPUT"
            echo "reason=no files changed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${new_findings:-0}" -gt 0 ]; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "branch=" >> "$GITHUB_OUTPUT"
            echo "reason=new Analyzer findings detected" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          fix_branch="$INPUT_FIX_BRANCH_PREFIX/run-${{ github.run_id }}-${{ github.run_attempt }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$fix_branch"
          git add --pathspec-from-file="$changed_file"
          git commit --no-verify -m "Apply API version cleanup"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push --set-upstream origin "$fix_branch"

          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$fix_branch" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "reason=fix branch pushed" >> "$GITHUB_OUTPUT"

      - name: Publish API version trust status
        if: ${{ steps.push-fix.outputs.commit_sha != '' }}
        uses: actions/github-script@v8
        env:
          FIX_COMMIT_SHA: ${{ steps.push-fix.outputs.commit_sha }}
          RUN_DEPLOY_VALIDATE: ${{ inputs.run_deploy_validate }}
          DEPLOY_VALIDATION_STATUS: ${{ steps.deploy-validation.outputs.deploy_validation_status }}
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'project/docs/api-version-upgrade-guard/comparison-summary.env';

            const summary = Object.fromEntries(
              fs.readFileSync(summaryPath, 'utf8')
                .split(/\r?\n/)
                .filter(Boolean)
                .map((line) => {
                  const index = line.indexOf('=');
                  return index === -1 ? [line, ''] : [line.slice(0, index), line.slice(index + 1)];
                })
            );

            const newFindings = Number(summary.new_findings || 0);
            const newHighOrCritical = Number(summary.new_high_or_critical || 0);
            const deployPassed = process.env.RUN_DEPLOY_VALIDATE !== 'true' ||
              process.env.DEPLOY_VALIDATION_STATUS === 'passed';
            const trusted = newFindings === 0 && newHighOrCritical === 0 && deployPassed;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.FIX_COMMIT_SHA,
              state: trusted ? 'success' : 'failure',
              context: 'API Version Guard / Automated Trust Gate',
              description: trusted
                ? 'No regressions detected and Salesforce validation passed'
                : 'Automated trust requirements were not satisfied',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

            if (!trusted) {
              core.setFailed('The generated API version commit did not satisfy the automated trust gate.');
            }

      - name: Open API version fix pull request
        id: fix-pr
        if: ${{ inputs.create_pull_request && steps.push-fix.outputs.branch != '' && (!inputs.run_deploy_validate || steps.deploy-validation.outputs.deploy_validation_status == 'passed') }}
        uses: actions/github-script@v8
        env:
          FIX_BRANCH_NAME: ${{ steps.push-fix.outputs.branch }}
          TARGET_REF: ${{ inputs.target_ref }}
          TARGET_API_VERSION: ${{ steps.resolve-api.outputs.target_api_version }}
          SOURCE_DIR: ${{ inputs.source_dir }}
          DRAFT_PULL_REQUEST: ${{ inputs.draft_pull_request }}
          DEPLOY_VALIDATION_STATUS: ${{ steps.deploy-validation.outputs.deploy_validation_status }}
          DEPLOY_VALIDATION_EXIT_CODE: ${{ steps.deploy-validation.outputs.deploy_validation_exit_code }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = process.env.FIX_BRANCH_NAME;
            const base = process.env.TARGET_REF;
            const summaryPath = 'project/docs/api-version-upgrade-guard/comparison-summary.env';
            const resolutionPath = 'project/docs/api-version-upgrade-guard/api-version-resolution.json';

            function readEnvFile(filePath) {
              if (!fs.existsSync(filePath)) return {};
              return Object.fromEntries(
                fs.readFileSync(filePath, 'utf8')
                  .split(/\r?\n/)
                  .filter(Boolean)
                  .map((line) => {
                    const index = line.indexOf('=');
                    return index === -1 ? [line, ''] : [line.slice(0, index), line.slice(index + 1)];
                  })
              );
            }

            const summary = readEnvFile(summaryPath);
            const resolution = JSON.parse(fs.readFileSync(resolutionPath, 'utf8'));

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${head}`,
              base
            });

            if (existing.data.length) {
              core.setOutput('url', existing.data[0].html_url);
              core.info(`Existing PR found: ${existing.data[0].html_url}`);
              return;
            }

            const body = [
              'Automated API version cleanup generated by the API Version Upgrade Guard.',
              '',
              `- Target API version: ${process.env.TARGET_API_VERSION}`,
              `- Source directory: ${process.env.SOURCE_DIR}`,
              `- Workflow run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              '',
              '## Trust Ruleset',
              '',
              '| Rule | Status |',
              '| --- | --- |',
              `| Fix branch created | PASS |`,
              `| API version resolution | ${resolution.currentProjectVersion || 'not configured'} -> ${resolution.resolved} (${resolution.resolutionSource}) |`,
              `| Analyzer new High/Critical findings | ${summary.new_high_or_critical || '0'} |`,
              `| API version findings | ${summary.api_version_before || '0'} -> ${summary.api_version_after || '0'} |`,
              `| Analyzer total findings | ${summary.total_before || '0'} -> ${summary.total_after || '0'} |`,
              `| Salesforce deploy validation | ${process.env.DEPLOY_VALIDATION_STATUS || 'not executed'} (${process.env.DEPLOY_VALIDATION_EXIT_CODE || 'unknown'}) |`,
              `| External PR checks | PENDING |`,
              '',
              'Rules: keep this PR as draft until external checks pass and the generated patch has been reviewed.',
              '',
              'Review the patch and workflow artifacts before merging.'
            ].join('\n');

            const pull = await github.rest.pulls.create({
              owner,
              repo,
              title: `Apply API version cleanup (${process.env.TARGET_API_VERSION})`,
              head,
              base,
              body,
              draft: process.env.DRAFT_PULL_REQUEST === 'true'
            });

            core.setOutput('url', pull.data.html_url);
            core.info(`Created PR: ${pull.data.html_url}`);

      - name: Publish API version run result
        if: ${{ always() }}
        shell: bash
        working-directory: project
        env:
          FIX_BRANCH_PUSHED: ${{ steps.push-fix.outputs.pushed }}
          FIX_BRANCH_NAME: ${{ steps.push-fix.outputs.branch }}
          FIX_BRANCH_REASON: ${{ steps.push-fix.outputs.reason }}
          FIX_PR_URL: ${{ steps.fix-pr.outputs.url }}
          DEPLOY_VALIDATION_STATUS: ${{ steps.deploy-validation.outputs.deploy_validation_status }}
          DEPLOY_VALIDATION_EXIT_CODE: ${{ steps.deploy-validation.outputs.deploy_validation_exit_code }}
          RESOLVED_TARGET_API_VERSION: ${{ steps.resolve-api.outputs.target_api_version }}
        run: |
          summary_file="${REPORT_DIR}/comparison-summary.env"
          deploy_log="${REPORT_DIR}/deploy-validation.log"
          resolution_json="${REPORT_DIR}/api-version-resolution.json"
          upgrade_json="${REPORT_DIR}/api-version-upgrade-report.json"

          append_deploy_validation_summary() {
            echo "### Salesforce Deployment Validation"
            echo
            if [ "$INPUT_RUN_DEPLOY_VALIDATE" != "true" ]; then
              echo "- Status: not executed."
              return
            fi

            echo "- Status: **${DEPLOY_VALIDATION_STATUS:-failed}**"
            echo "- Exit code: **${DEPLOY_VALIDATION_EXIT_CODE:-unknown}**"
            if [ "${DEPLOY_VALIDATION_STATUS:-failed}" = "passed" ]; then
              echo "- Merge recommendation: **SAFE TO REVIEW**"
            else
              echo "- Merge recommendation: **NOT SAFE**"
            fi
            if [ "$INPUT_ENFORCE_DEPLOY_VALIDATION" = "true" ]; then
              echo "- Enforcement: blocking"
            else
              echo "- Enforcement: advisory"
            fi

            if [ -f "$deploy_log" ]; then
              echo
              echo "<details>"
              echo "<summary>Main validation output</summary>"
              echo
              echo '```text'
              perl -pe 's/\e\[[0-9;?]*[A-Za-z]//g' "$deploy_log" \
                | grep -E '^(Status:|Deploy ID:|Test Failures|Passing:|Failing:|Total:|Error \(|.*Average test coverage.*|.*at least [0-9]+%.*|.*FIELD_CUSTOM_VALIDATION_EXCEPTION.*|.*CANNOT_EXECUTE_FLOW_TRIGGER.*|.*System\.AssertException.*|.*Class\..*: line .*)' \
                | head -n 80 || true
              echo '```'
              echo
              echo "</details>"
            else
              echo "- Output: validation log not found."
            fi
          }

          if [ ! -f "$summary_file" ]; then
            {
              echo "## API Version Upgrade Result"
              echo
              echo "**NOT SAFE**"
              echo
              echo "Analyzer comparison was not generated. Review the previous steps."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          set -a
          . "$summary_file"
          set +a

          current_api_version="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.currentProjectVersion || 'not configured')" "$resolution_json")"
          resolution_source="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.resolutionSource)" "$resolution_json")"
          version_files_changed="$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1])); console.log(r.realChangedFiles || 0)" "$upgrade_json")"

          if [ "${new_high_or_critical:-0}" -gt 0 ]; then
            decision="NOT SAFE"
            reason="New High/Critical findings appeared after the API version update."
          elif [ "$INPUT_RUN_DEPLOY_VALIDATE" = "true" ] && [ "${DEPLOY_VALIDATION_STATUS:-failed}" != "passed" ]; then
            decision="NOT SAFE"
            reason="Salesforce deployment validation failed after the API version update."
          elif [ "$version_files_changed" -gt 0 ] && [ "$INPUT_RUN_DEPLOY_VALIDATE" = "true" ]; then
            decision="SAFE TO REVIEW"
            reason="API metadata was upgraded and Salesforce deployment validation passed."
          elif [ "$version_files_changed" -gt 0 ]; then
            decision="REVIEW REQUIRED"
            reason="API metadata was upgraded, but Salesforce deployment validation was not executed."
          else
            decision="NO CHANGE"
            reason="The project already uses the resolved API version."
          fi

          echo "API version result"
          echo "Decision: ${decision}"
          echo "Reason: ${reason}"
          echo "Resolved API version: ${current_api_version} -> ${RESOLVED_TARGET_API_VERSION} (${resolution_source})"
          echo "Version files changed: ${version_files_changed}"
          echo "API version findings: ${api_version_before:-0} -> ${api_version_after:-0}"
          echo "Analyzer findings: ${total_before:-0} -> ${total_after:-0}"
          echo "New High/Critical: ${new_high_or_critical:-0}"
          echo "::notice title=API version result::${decision}. ${reason} Resolved version: ${current_api_version}->${RESOLVED_TARGET_API_VERSION}. Files changed: ${version_files_changed}. Analyzer: ${total_before:-0}->${total_after:-0}. New High/Critical: ${new_high_or_critical:-0}."

          {
            echo "## API Version Upgrade Result"
            echo
            echo "### Decision"
            echo
            echo "**${decision}**"
            echo
            echo "${reason}"
            echo
            echo "- API version: **${current_api_version} -> ${RESOLVED_TARGET_API_VERSION}**"
            echo "- Resolution source: **${resolution_source}**"
            echo "- Version files changed: **${version_files_changed}**"
            echo
            echo "| Metric | Before | After |"
            echo "| --- | ---: | ---: |"
            echo "| API version findings | ${api_version_before:-0} | ${api_version_after:-0} |"
            echo "| Analyzer findings | ${total_before:-0} | ${total_after:-0} |"
            echo "| New findings | 0 | ${new_findings:-0} |"
            echo "| New High/Critical | 0 | ${new_high_or_critical:-0} |"
            echo
            echo "### Patch"
            echo
            if [ "${FIX_BRANCH_PUSHED}" = "true" ]; then
              echo "- Fix branch: \`${FIX_BRANCH_NAME}\`"
              if [ -n "${FIX_PR_URL:-}" ]; then
                echo "- Pull request: ${FIX_PR_URL}"
              fi
            elif [ "$INPUT_ENFORCE_DEPLOY_VALIDATION" = "true" ] && [ "$INPUT_RUN_DEPLOY_VALIDATE" = "true" ] && [ "${DEPLOY_VALIDATION_STATUS:-failed}" != "passed" ]; then
              echo "- Fix branch: not created."
              echo "- Reason: deploy validation failed and enforcement is blocking."
            else
              echo "- Fix branch: not created."
              echo "- Reason: ${FIX_BRANCH_REASON:-not applicable}."
            fi
            if [ "$INPUT_RUN_DEPLOY_VALIDATE" = "true" ]; then
              echo "- Deploy validation: ${DEPLOY_VALIDATION_STATUS:-failed}."
            else
              echo "- Deploy validation: not executed."
            fi
            echo
            append_deploy_validation_summary
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
      - name: List generated reports
        if: ${{ always() }}
        shell: bash
        working-directory: project
        run: |
          find docs/api-version-upgrade-guard -maxdepth 1 -type f -print | sort || true

      - name: Sanitize report paths
        if: ${{ always() }}
        shell: bash
        working-directory: project
        run: |
          export PROJECT_ROOT="$(pwd)"
          export WORKSPACE_ROOT="${GITHUB_WORKSPACE}"

          find "${REPORT_DIR}" -type f \( \
            -name "*.csv" -o \
            -name "*.json" -o \
            -name "*.md" -o \
            -name "*.txt" -o \
            -name "*.html" \
          \) -print0 | while IFS= read -r -d '' file; do
            perl -0pi -e 's#\Q$ENV{PROJECT_ROOT}\E/?##g; s#\Q$ENV{WORKSPACE_ROOT}\E/?##g' "$file"
          done

      - name: Upload API version guard artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: api-version-upgrade-guard-${{ github.run_number }}
          path: |
            project/docs/api-version-upgrade-guard/api-version-upgrade-report.md
            project/docs/api-version-upgrade-guard/api-version-upgrade-report.json
            project/docs/api-version-upgrade-guard/api-version-resolution.md
            project/docs/api-version-upgrade-guard/api-version-resolution.json
            project/docs/api-version-upgrade-guard/salesforce-supported-api-versions.json
            project/docs/api-version-upgrade-guard/api-version-upgrade.patch
            project/docs/api-version-upgrade-guard/api-version-upgrade-full.patch
            project/docs/api-version-upgrade-guard/api-version-upgrade-real.patch
            project/docs/api-version-upgrade-guard/changed-files.txt
            project/docs/api-version-upgrade-guard/diff-validation.txt
            project/docs/api-version-upgrade-guard/invalid-diff.txt
            project/docs/api-version-upgrade-guard/analyzer-before.csv
            project/docs/api-version-upgrade-guard/analyzer-after.csv
            project/docs/api-version-upgrade-guard/analyzer-comparison.md
            project/docs/api-version-upgrade-guard/analyzer-comparison.json
            project/docs/api-version-upgrade-guard/comparison-summary.env
            project/docs/api-version-upgrade-guard/api-version-upgrade-summary.html
            project/docs/api-version-upgrade-guard/deploy-validation-report.md
            project/docs/api-version-upgrade-guard/deploy-validation.log
          if-no-files-found: warn

      - name: Fail if enforced deploy validation failed
        if: ${{ inputs.enforce_deploy_validation && inputs.run_deploy_validate && steps.deploy-validation.outputs.deploy_validation_status != 'passed' }}
        shell: bash
        run: |
          echo "Deploy validation failed and enforcement is active. Check deploy-validation.log in the uploaded artifact."
          exit 1
